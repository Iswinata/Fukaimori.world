<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — An Archive. Exploring the depths of humanity." />
  <title>Fukaimori · An Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Cantarell:wght@400;700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ============================================================
       Mobile layout — 474 × 814 px (Figma Frame 253)
       Shown only when viewport width ≤ 768 px.
       Desktop layout (.viewport) shown above 768 px.
    ============================================================ */

    /* ── Switch: show desktop, hide mobile by default ── */
    .viewport     { display: flex; }   /* desktop on */
    .mob-viewport { display: none; }   /* mobile off */

    @media (max-width: 768px) {
      .viewport     { display: none; } /* desktop off */
      .mob-viewport { display: flex; } /* mobile on  */
    }

    /* ── Mobile stage ── */
    .mob-viewport {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      align-items: center;
      justify-content: center;
      background: #05020a;
      overflow: hidden;
    }

    /* ── Design canvas: 474 × 814 — JS scales to COVER screen ── */
    .mob-canvas {
      position: relative;
      width: 474px;
      height: 814px;
      flex: none;
      overflow: hidden;
      transform: scale(var(--mob-scale, 1));
      transform-origin: center center;
    }

    /* ── Background: BGM.png ── */
    .mob-bg {
      position: absolute;
      width: 474px;
      height: 814px;
      left: 0;
      top: 0;
      background: url("BGM.png") center center / cover no-repeat;
      z-index: 1;
    }

    /* ── Feather particles canvas ── */
    .mob-starfield {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      display: block;
    }

    /* ── Hamburger — Group 168: left 27, top 38, size 20.22 × 12.77 ── */
    .mob-hamburger {
      position: absolute;
      left: 27px;
      top: 38px;
      width: 20.22px;
      height: 12.77px;
      z-index: 9;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      -webkit-appearance: none;
    }
    .mob-hamburger-line {
      display: block;
      width: 20.22px;
      height: 0;
      border-top: 2.12889px solid #7960FF;
      border-radius: 1px;
    }

    /* ── Nav overlay — Frame 267 ── */
    .mob-nav-overlay {
      position: absolute;
      width: 474px;
      height: 814px;
      left: 0;
      top: 0;
      z-index: 20;
      background: rgba(5, 0, 34, 0.54);
      backdrop-filter: blur(7.2px);
      -webkit-backdrop-filter: blur(7.2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .mob-nav-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .mob-nav-close {
      position: absolute;
      left: 22px;
      top: 32px;
      width: 25px;
      height: 25px;
      background: none;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      -webkit-appearance: none;
    }
    .mob-nav-close svg { width: 25px; height: 25px; display: block; }
    .mob-nav-link {
      position: absolute;
      height: 33px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 27.2613px;
      line-height: 33px;
      text-align: center;
      letter-spacing: 0.12em;
      color: #B5A9FF;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }
    .mob-nav-link:active { color: #fff; text-shadow: 0 0 12px rgba(180,160,255,0.8); }
    .mob-nav-droppoint { width: 200px; left: calc(50% - 100px - 0.25px); top: 127px; }
    .mob-nav-archive   { width: 241px; left: calc(50% - 120.5px - 0.5px); top: 195px; }
    .mob-nav-brand {
      position: absolute;
      width: 146.41px;
      height: 21px;
      left: calc(50% - 146.41px / 2 + 0.21px);
      top: 34px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 7px;
      pointer-events: none;
    }
    .mob-nav-brand-mark {
      flex-shrink: 0;
      width: 16.16px;
      height: 18.13px;
      background: url("Subtract.png") center center / contain no-repeat;
    }
    .mob-nav-brand-text {
      font-family: 'Cantarell', system-ui, sans-serif;
      font-weight: 700;
      font-size: 14.8308px;
      line-height: 21px;
      letter-spacing: 0.21em;
      white-space: nowrap;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Brand — Group 143: centered, top 34, 146.41 × 21 ── */
    .mob-brand {
      position: absolute;
      width: 146.41px;
      height: 21px;
      left: calc(50% - 146.41px / 2 + 0.21px);
      top: 34px;
      z-index: 9;
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .mob-brand-mark {
      flex-shrink: 0;
      width: 16.16px;
      height: 18.13px;
      background: url("Subtract.png") center center / contain no-repeat;
    }
    .mob-brand-text {
      font-family: 'Cantarell', system-ui, sans-serif;
      font-weight: 700;
      font-size: 14.8308px;
      line-height: 21px;
      letter-spacing: 0.21em;
      white-space: nowrap;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── BGLPM moon — left 197, top 329, 79 × 80 ── */
    .mob-moon {
      position: absolute;
      width: 79px;
      height: 80px;
      left: 197px;
      top: 329px;
      background: url("BGLPM.png") center center / 100% 100% no-repeat;
      z-index: 4;
      pointer-events: none;
    }

    /* ── Moon portal hitbox ── */
    .mob-moon-link {
      position: absolute;
      width: 79px;
      height: 80px;
      left: 197px;
      top: 329px;
      z-index: 5;
      border-radius: 50%;
      display: block;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      animation: mob-moon-pulse 3s ease-in-out infinite;
    }
    .mob-moon-link:focus-visible {
      outline: 2px solid rgba(105, 78, 171, 0.8);
      outline-offset: 4px;
    }
    @keyframes mob-moon-pulse {
      0%, 100% {
        box-shadow:
          0 0 12px 6px rgba(60, 20, 100, 0.45),
          0 0 28px 12px rgba(80, 30, 130, 0.3),
          0 0 55px 24px rgba(60, 20, 100, 0.18);
      }
      50% {
        box-shadow:
          0 0 20px 10px rgba(90, 40, 160, 0.7),
          0 0 45px 20px rgba(70, 25, 120, 0.5),
          0 0 80px 40px rgba(50, 15, 90, 0.3);
      }
    }

    /* ── Title group — Group 52: centered, top 681, 262 × 38.74, -0.3deg ── */
    .mob-title-group {
      position: absolute;
      width: 262px;
      height: 38.74px;
      left: calc(50% - 262px / 2);
      top: 681px;
      transform: rotate(-0.3deg);
      z-index: 8;
    }

    /* AN ARCHIVE */
    .mob-title {
      position: absolute;
      width: 157px;
      height: 20px;
      left: 53.17px;
      top: 0.27px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 16.9464px;
      line-height: 20px;
      text-align: center;
      letter-spacing: 0.31em;
      color: #FFFFFF;
      white-space: nowrap;
      text-shadow:
        0 0 3px rgba(197, 188, 255, 0.55),
        0 0 8px rgba(150, 105, 255, 0.4),
        0 0 16px rgba(105, 78, 171, 0.28);
    }

    /* EXPLORING THE DEPTHS OF HUMANITY */
    .mob-subtitle {
      position: absolute;
      width: 262px;
      height: 11px;
      left: 0.14px;
      top: 27.74px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 9.53914px;
      line-height: 11px;
      text-align: center;
      letter-spacing: 0.25em;
      color: #FFFFFF;
      white-space: nowrap;
      text-shadow:
        0 0 3px rgba(197, 188, 255, 0.55),
        0 0 8px rgba(150, 105, 255, 0.4),
        0 0 16px rgba(105, 78, 171, 0.28);
    }

    /* ── Mobile page transition ── */
    .mob-page-transition {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      background: #05020a;
      opacity: 0;
      animation: none;
    }
    .mob-page-transition.is-leaving {
      pointer-events: all;
      animation: mob-pt-fade-out 0.35s ease forwards;
    }
    .mob-page-transition.is-entering {
      opacity: 1;
      pointer-events: none;
      animation: mob-pt-fade-in 0.4s ease forwards;
    }
    @keyframes mob-pt-fade-out {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes mob-pt-fade-in {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Hide mobile transition on desktop so it doesn't interfere */
    @media (min-width: 769px) {
      .mob-page-transition { display: none; }
    }
  </style>
</head>
<body>

  <!-- Mobile page transition overlay (separate from desktop's) -->

  <script src="script.js"></script>
  <script>
    /* ============================================================
       Mobile-only scripts — only run when mobile layout is active
    ============================================================ */
    (function () {
      'use strict';

      function isMobileLayout() {
        return window.matchMedia('(max-width: 768px)').matches;
      }

      /* Fix aria-hidden + tabindex on layout switch so screen readers
         always get only the visible layout */
      function syncAccessibility() {
        var desktop = document.querySelector('.viewport');
        var mobile  = document.querySelector('.mob-viewport');
        if (!desktop || !mobile) return;

        var onMobile = isMobileLayout();

        // Desktop layout
        desktop.setAttribute('aria-hidden', onMobile ? 'true' : 'false');
        desktop.querySelectorAll('a, button, [tabindex]').forEach(function (el) {
          if (onMobile) {
            el.setAttribute('data-saved-tabindex', el.getAttribute('tabindex') || '');
            el.setAttribute('tabindex', '-1');
          } else {
            var saved = el.getAttribute('data-saved-tabindex');
            if (saved !== null && saved !== '') {
              el.setAttribute('tabindex', saved);
            } else {
              el.removeAttribute('tabindex');
            }
            el.removeAttribute('data-saved-tabindex');
          }
        });

        // Mobile layout
        mobile.setAttribute('aria-hidden', onMobile ? 'false' : 'true');
        mobile.querySelectorAll('a, button').forEach(function (el) {
          if (onMobile) {
            el.removeAttribute('tabindex');
          } else {
            el.setAttribute('tabindex', '-1');
          }
        });
      }

      syncAccessibility();
      window.addEventListener('resize', syncAccessibility);

      /* ── Mobile canvas scaler: COVER ── */
      (function scaler() {
        var canvas = document.getElementById('mobCanvas');
        if (!canvas) return;
        var DW = 474, DH = 814;

        function apply() {
          if (!isMobileLayout()) return;
          var vw = window.innerWidth;
          var vh = window.innerHeight || document.documentElement.clientHeight;
          var scale = Math.max(vw / DW, vh / DH);
          canvas.style.setProperty('--mob-scale', String(scale));
        }

        apply();
        window.addEventListener('resize', apply);
        window.addEventListener('orientationchange', function () { setTimeout(apply, 100); });
      })();

      /* ── Mobile page transition ── */
      (function initMobTransition() {
        var overlay = document.getElementById('mobPageTransition');
        if (!overlay) return;

        if (overlay.classList.contains('is-leaving')) {
          overlay.classList.remove('is-leaving');
          overlay.style.opacity = '0';
          overlay.style.animation = 'none';
          void overlay.offsetWidth;
          overlay.style.opacity = '';
          overlay.style.animation = '';
        }

        if (isMobileLayout()) {
          overlay.classList.add('is-entering');
          overlay.addEventListener('animationend', function onIn() {
            overlay.classList.remove('is-entering');
            overlay.removeEventListener('animationend', onIn);
          });
        }

        window.addEventListener('pageshow', function (e) {
          if (!e.persisted || !isMobileLayout()) return;
          overlay.classList.remove('is-leaving', 'is-entering');
          overlay.style.opacity = '0';
          overlay.style.animation = 'none';
          void overlay.offsetWidth;
          overlay.style.opacity = '';
          overlay.style.animation = '';
          overlay.classList.add('is-entering');
          overlay.addEventListener('animationend', function onR() {
            overlay.classList.remove('is-entering');
            overlay.removeEventListener('animationend', onR);
          });
        });

        function navigate(href) {
          overlay.classList.remove('is-entering');
          overlay.classList.add('is-leaving');
          overlay.addEventListener('animationend', function onLeft() {
            overlay.removeEventListener('animationend', onLeft);
            window.location.href = href;
          });
        }

        /* Intercept mobile nav links (brand only; hamburger now opens overlay) */
        document.querySelectorAll('.mob-brand').forEach(function (link) {
          var href = link.getAttribute('href');
          if (!href || href === '#') return;
          link.addEventListener('click', function (e) {
            if (!isMobileLayout()) return;
            e.preventDefault();
            navigate(href);
          });
        });

        /* Nav overlay links — close overlay then navigate */
        document.querySelectorAll('#mobNavOverlay a[href]').forEach(function (link) {
          link.addEventListener('click', function (e) {
            if (!isMobileLayout()) return;
            e.preventDefault();
            navigate(link.getAttribute('href'));
          });
        });
      })();

      /* ── Nav overlay open/close ── */
      (function initMobNav() {
        var hamburger = document.getElementById('mobHamburger');
        var overlay   = document.getElementById('mobNavOverlay');
        var closeBtn  = document.getElementById('mobNavClose');
        if (!hamburger || !overlay) return;

        function openNav() {
          if (!isMobileLayout()) return;
          overlay.classList.add('open');
          overlay.setAttribute('aria-hidden', 'false');
          hamburger.setAttribute('aria-expanded', 'true');
          /* give close button keyboard focus */
          if (closeBtn) closeBtn.focus();
        }

        function closeNav() {
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
          hamburger.setAttribute('aria-expanded', 'false');
          hamburger.focus();
        }

        hamburger.addEventListener('click', openNav);
        if (closeBtn) closeBtn.addEventListener('click', closeNav);

        /* tap on the dimmed area (not on links) closes the overlay */
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeNav();
        });

        /* Escape key */
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && overlay.classList.contains('open')) closeNav();
        });
      })();

      /* ── Moon portal tap — ripple then navigate ── */
      (function initMobMoon() {
        var link = document.querySelector('.mob-moon-link');
        if (!link) return;

        link.addEventListener('click', function (e) {
          if (!isMobileLayout()) return;
          e.preventDefault();

          var rect = link.getBoundingClientRect();
          var cx   = rect.left + rect.width  / 2;
          var cy   = rect.top  + rect.height / 2;
          var size = Math.max(rect.width, rect.height);

          for (var i = 0; i < 3; i++) {
            (function (delay) {
              var ring = document.createElement('div');
              ring.style.cssText = [
                'position:fixed',
                'border-radius:50%',
                'border:2px solid rgba(160,80,255,0.85)',
                'box-shadow:0 0 10px 3px rgba(160,80,255,0.5)',
                'pointer-events:none',
                'z-index:98',
                'left:'        + cx          + 'px',
                'top:'         + cy          + 'px',
                'width:'       + size        + 'px',
                'height:'      + size        + 'px',
                'margin-left:' + (-size / 2) + 'px',
                'margin-top:'  + (-size / 2) + 'px',
                'transform:scale(1)',
                'opacity:1',
                'transition:none'
              ].join(';');
              document.body.appendChild(ring);
              setTimeout(function () {
                ring.style.transition = 'transform 1.0s ease-out, opacity 1.0s ease-out';
                ring.style.transform  = 'scale(4.5)';
                ring.style.opacity    = '0';
              }, delay);
              setTimeout(function () { ring.remove(); }, delay + 1100);
            })(i * 280);
          }

          setTimeout(function () {
            var ov = document.getElementById('mobPageTransition');
            if (ov) {
              ov.classList.remove('is-entering');
              ov.classList.add('is-leaving');
              ov.addEventListener('animationend', function onLeft() {
                ov.removeEventListener('animationend', onLeft);
                window.location.href = 'archive.html';
              });
            } else {
              window.location.href = 'archive.html';
            }
          }, 650);
        });
      })();

      /* ── Mobile feather particles ── */
      (function initMobFeathers() {
        var cvs = document.querySelector('.mob-starfield');
        if (!cvs) return;
        var ctx = cvs.getContext('2d');
        var W, H, feathers = [];
        var NUM = 40;
        var palette = [
          [180, 100, 255], [210, 140, 255], [150,  70, 230],
          [220, 160, 255], [130,  50, 210], [255, 200, 255], [170, 90, 255]
        ];

        function resize() {
          var p = cvs.parentElement;
          W = cvs.width  = p ? p.offsetWidth  : 474;
          H = cvs.height = p ? p.offsetHeight : 814;
        }

        function rndFeather() {
          var col = palette[Math.floor(Math.random() * palette.length)];
          return {
            x: Math.random() * (W || 474), y: Math.random() * (H || 814),
            angle: Math.random() * Math.PI * 2,
            drift: Math.random() * Math.PI * 2,
            spin:  (Math.random() - 0.5) * 0.018,
            speed: Math.random() * 0.18 + 0.04,
            len:   Math.random() * 18 + 6,
            width: Math.random() * 1.4 + 0.4,
            col:   col,
            baseAlpha:     Math.random() * 0.5 + 0.3,
            twinklePeriod: Math.random() * 160 + 70,
            twinklePhase:  Math.random() * Math.PI * 2
          };
        }

        var frame = 0;
        function draw() {
          ctx.clearRect(0, 0, W, H);
          frame++;
          for (var j = 0; j < feathers.length; j++) {
            var f = feathers[j];
            f.x += Math.cos(f.drift) * f.speed;
            f.y += Math.sin(f.drift) * f.speed;
            f.angle += f.spin;
            if (f.x < -f.len) f.x = W + f.len;
            if (f.x > W + f.len) f.x = -f.len;
            if (f.y < -f.len) f.y = H + f.len;
            if (f.y > H + f.len) f.y = -f.len;

            var tw = Math.sin(frame / f.twinklePeriod * Math.PI * 2 + f.twinklePhase);
            var fa = Math.max(0.06, Math.min(0.92, f.baseAlpha + tw * 0.28));

            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.rotate(f.angle);
            var g = ctx.createLinearGradient(-f.len / 2, 0, f.len / 2, 0);
            g.addColorStop(0,    'rgba(' + f.col + ',0)');
            g.addColorStop(0.25, 'rgba(' + f.col + ',' + (fa * 0.5).toFixed(2) + ')');
            g.addColorStop(0.5,  'rgba(' + f.col + ',' + fa.toFixed(2) + ')');
            g.addColorStop(0.75, 'rgba(' + f.col + ',' + (fa * 0.5).toFixed(2) + ')');
            g.addColorStop(1,    'rgba(' + f.col + ',0)');
            ctx.shadowColor = 'rgba(' + f.col + ',' + (fa * 0.9).toFixed(2) + ')';
            ctx.shadowBlur  = 8;
            ctx.beginPath();
            ctx.moveTo(-f.len / 2, 0);
            ctx.lineTo( f.len / 2, 0);
            ctx.strokeStyle = g;
            ctx.lineWidth   = f.width * 2.2;
            ctx.stroke();
            ctx.restore();
          }
          requestAnimationFrame(draw);
        }

        resize();
        feathers = [];
        for (var i = 0; i < NUM; i++) feathers.push(rndFeather());
        draw();
        window.addEventListener('resize', function () { resize(); feathers = []; for (var i = 0; i < NUM; i++) feathers.push(rndFeather()); });
      })();

    })();
  </script>
