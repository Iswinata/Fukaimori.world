<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Own the Archive. Sesshomaru · AW 001." />
  <title>Fukaimori · Own the Archive — Sesshomaru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Cantarell:wght@400;700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Frame 243 — Figma exact spec ── */
    /* Canvas: 2168 × 1080 */

    .as-canvas { background: #FFFFFF; }

    /* BGCO — full canvas background image */
    .as-bg {
      position: absolute;
      width: 2168px;
      height: 1080px;
      left: 0px;
      top: calc(50% - 1080px / 2);
      background: url("Sesshomaru Wallpaper (1).png") center / cover no-repeat;
      z-index: 2;
      pointer-events: none;
    }

    /* Rectangle 12 — dark overlay */
    .as-overlay {
      position: absolute;
      width: 2168px;
      height: 1080px;
      left: calc(50% - 2168px / 2);
      top: calc(50% - 1080px / 2);
      background: rgba(0, 0, 0, 0.4);
      z-index: 3;
      pointer-events: none;
    }

    /* ── Logo mark ── */
    .as-logo {
      position: absolute;
      left: 51px;
      top: 44px;
      width: 36.01px;
      height: 40.7px;
      z-index: 11;
      background-image: url("Subtract.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      display: block;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.35s ease, transform 0.35s ease;
    }
    @keyframes as-logo-pulse {
      0%, 100% {
        filter: drop-shadow(0 0 6px rgba(150,105,255,0.7))
                drop-shadow(0 0 14px rgba(105,78,171,0.5))
                brightness(1.2);
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(180,130,255,1))
                drop-shadow(0 0 28px rgba(120,90,200,0.85))
                drop-shadow(0 0 48px rgba(80,40,180,0.5))
                brightness(1.45);
      }
    }
    .as-logo:hover,
    .as-logo:focus-visible {
      animation: as-logo-pulse 1.4s ease-in-out infinite;
      transform: scale(1.1);
      outline: none;
    }

    /* ── Group 109 / Rectangle 19 — the main panel ── */
    /* Figma: left 132, top 123, 1903.15 × 835 */
    .as-panel {
      position: absolute;
      box-sizing: border-box;
      width: 1903.15px;
      height: 835px;
      left: calc(50% - 1903.15px / 2 - 0.43px);
      top: calc(50% - 835px / 2 + 0.5px);
      background: rgba(0, 0, 0, 0.27);
      border: 1.77506px solid #786BC7;
      box-shadow: 0px 0px 48.4031px 8.47055px #6D61B5;
      backdrop-filter: blur(10.05px);
      -webkit-backdrop-filter: blur(10.05px);
      z-index: 6;
      overflow: hidden;
    }

    /* ── Group 107 — left image cluster: 1039.68 × 770.47 ── */
    /* Figma: left calc(50%−1039.68/2−398.27), top calc(50%−770.47/2+0.77) */
    /* All child positions are absolute within the panel */

    /* Group 102 — main large image: 772.65 × 770.47, left 432.93 */
    .as-img-main {
      position: absolute;
      width: 772.65px;
      height: 770.47px;
      left: 432.93px;
      top: calc(50% - 770.47px / 2 + 0.77px);
      background: url("Newseso.png") center / cover no-repeat;
    }

    /* Group 103 — top-left small: 235.86 × 235.19, left 165.89 */
    .as-img-top {
      position: absolute;
      width: 235.86px;
      height: 235.19px;
      left: 165.89px;
      top: calc(50% - 235.19px / 2 - 266.87px);
      background: url("Newseso.png") center / cover no-repeat;
    }

    /* Group 106 — middle-left small: 235.86 × 235.19, left 165.89 */
    .as-img-mid {
      position: absolute;
      width: 235.86px;
      height: 235.19px;
      left: 165.89px;
      top: calc(50% - 235.19px / 2 + 0.17px);
      background: url("Newseso.png") center / cover no-repeat;
    }

    /* Group 105 — bottom-left small: 235.86 × 235.19, left 165.89 */
    .as-img-bot {
      position: absolute;
      width: 235.86px;
      height: 235.19px;
      left: 165.89px;
      top: calc(50% - 235.19px / 2 + 267.2px);
      background: url("Newseso.png") center / cover no-repeat;
    }

    /* ── Text elements — all relative to panel ── */

    /* AW 001 — left 1261.15, top 169 */
    .as-id {
      position: absolute;
      width: 98px;
      height: 19px;
      left: 1261.15px;
      top: 169px;
      font-family: "Century", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 26.9436px;
      line-height: 72%;
      display: flex;
      align-items: flex-end;
      letter-spacing: 0.01em;
      color: #B292FF;
    }

    /* SESSHOMARU — left 1261.15, top 218.56 */
    .as-name {
      position: absolute;
      width: 415px;
      height: 44px;
      left: 1261.15px;
      top: 218.56px;
      font-family: "Bona Nova", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 60.623px;
      line-height: 72%;
      display: flex;
      align-items: flex-end;
      letter-spacing: -0.005em;
      color: #9A937B;
      margin: 0;
    }

    /* Rp. 499.000 (strikethrough) — left 1261.15, top 293.57 */
    .as-price-old {
      position: absolute;
      width: 180px;
      height: 36px;
      left: 1261.15px;
      top: 293.57px;
      font-family: "Cantarell", system-ui, sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 30.3115px;
      line-height: 120%;
      display: flex;
      align-items: flex-end;
      text-decoration-line: line-through;
      color: #666666;
    }

    /* Rp. 399.000 — left 1468.36, top 283.61 */
    .as-price-new {
      position: absolute;
      width: 310px;
      height: 57px;
      left: 1468.36px;
      top: 283.61px;
      font-family: "Cantarell", system-ui, sans-serif;
      font-style: normal;
      font-weight: 700;
      font-size: 47.1512px;
      line-height: 120%;
      display: flex;
      align-items: flex-end;
      color: rgba(178, 142, 255, 0.67);
    }

    /* Line 3 — dashed divider */
    .as-line {
      position: absolute;
      width: 720px;
      height: 0px;
      left: 1261px;
      top: 387.51px;
      border: 0.841986px dashed #A3A3A3;
    }

    /* Description label — left 1261.15, top 426.23 */
    .as-desc-label {
      position: absolute;
      width: 180px;
      height: 40px;
      left: 1261.15px;
      top: 426.23px;
      font-family: "Century", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 33.6794px;
      line-height: 120%;
      display: flex;
      align-items: flex-end;
      color: #C5BAFF;
    }

    /* Group 101 / Frame 244 — dot: 15.05 × 15.05, left 1244.01, top 436.4 */
    .as-dot {
      position: absolute;
      width: 15.05px;
      height: 15.05px;
      left: 1244.01px;
      top: 436.4px;
      background: #786BC7;
      border-radius: 50%;
    }

    /* Description body — left 1261, top 484, w 689 */
    .as-desc-body {
      position: absolute;
      width: 689px;
      height: 140px;
      left: 1261px;
      top: 484px;
      font-family: "Bona Nova", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 26.9436px;
      line-height: 130%;
      display: flex;
      align-items: flex-end;
      color: #FFFFFF;
      margin: 0;
    }

    /* Color label — left 1261.15, top 662 */
    .as-color-label {
      position: absolute;
      width: 84px;
      height: 40px;
      left: 1261.15px;
      top: 662px;
      font-family: "Century", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 33.6794px;
      line-height: 120%;
      display: flex;
      align-items: flex-end;
      color: #C5BAFF;
    }

    /* Frame 19 — white swatch: 111.4 × 60.21, left 1261.15, top 725 */
    .as-swatch-white {
      position: absolute;
      box-sizing: border-box;
      width: 111.4px;
      height: 60.21px;
      left: 1261.15px;
      top: 725px;
      background: #EBEBEB;
      border: 1.50254px solid #FFFFFF;
      border-radius: 12.0427px;
      cursor: pointer;
      transition: box-shadow 0.25s ease;
    }
    .as-swatch-white:hover { box-shadow: 0 0 10px 3px rgba(235,235,235,0.5); }
    .as-swatch-white.selected {
      box-shadow: 0 0 0 2.5px #A658FF, 0 0 14px 4px rgba(166,88,255,0.5);
    }

    /* Frame 17 — black swatch: 111.4 × 60.21, left 1391.24, top 725 */
    .as-swatch-black {
      position: absolute;
      box-sizing: border-box;
      width: 111.4px;
      height: 60.21px;
      left: 1391.24px;
      top: 725px;
      background: #000000;
      border: 1.50534px solid #FFFFFF;
      border-radius: 12.0427px;
      cursor: pointer;
      transition: box-shadow 0.25s ease;
    }
    .as-swatch-black:hover { box-shadow: 0 0 10px 3px rgba(255,255,255,0.3); }
    .as-swatch-black.selected {
      box-shadow: 0 0 0 2.5px #A658FF, 0 0 14px 4px rgba(166,88,255,0.5);
    }

    /* Size label — left 1261, top 801 */
    .as-size-label {
      position: absolute;
      width: 58px;
      height: 36px;
      left: 1261px;
      top: 801px;
      font-family: "Century", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 30px;
      line-height: 120%;
      display: flex;
      align-items: flex-end;
      color: #C5BAFF;
    }

    /* Frame 21 — S button: 112.9 × 60.21, left 1261.15, top 852.36 */
    .as-size-s {
      position: absolute;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 21.0747px 54.1922px;
      gap: 12.04px;
      width: 112.9px;
      height: 60.21px;
      left: 1261.15px;
      top: 852.36px;
      border: 1.50534px solid #FFFFFF;
      border-radius: 12.0427px;
      background: transparent;
      cursor: pointer;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .as-size-s span {
      margin: 0 auto;
      width: 23px;
      height: 36px;
      font-family: "Cantarell", system-ui, sans-serif;
      font-style: normal;
      font-weight: 700;
      font-size: 30.1068px;
      line-height: 120%;
      display: flex;
      align-items: center;
      color: #D2CAFF;
    }

    /* Frame 19 — L button (active): 111.4 × 60.21, left 1395.12, top 852.36 */
    .as-size-l {
      position: absolute;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 21.0747px 54.1922px;
      gap: 12.04px;
      width: 111.4px;
      height: 60.21px;
      left: 1395.12px;
      top: 852.36px;
      background: #A658FF;
      border: 1.50534px solid #FFFFFF;
      border-radius: 12.0427px;
      cursor: pointer;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .as-size-l span {
      margin: 0 auto;
      width: 20px;
      height: 36px;
      font-family: "Cantarell", system-ui, sans-serif;
      font-style: normal;
      font-weight: 700;
      font-size: 30.1068px;
      line-height: 120%;
      display: flex;
      align-items: center;
      color: #FFFFFF;
    }

    /* Frame 18 — XL button: 112.9 × 60.21, left 1529.1, top 852.36 */
    .as-size-xl {
      position: absolute;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 21.0747px 54.1922px;
      gap: 12.04px;
      width: 112.9px;
      height: 60.21px;
      left: 1529.1px;
      top: 852.36px;
      border: 1.50534px solid #FFFFFF;
      border-radius: 12.0427px;
      background: transparent;
      cursor: pointer;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .as-size-xl span {
      margin: 0 auto;
      width: 42px;
      height: 36px;
      font-family: "Cantarell", system-ui, sans-serif;
      font-style: normal;
      font-weight: 700;
      font-size: 30.1068px;
      line-height: 120%;
      display: flex;
      align-items: center;
      color: #D2CAFF;
    }

    /* Active state for size buttons */
    .as-size-s.active,
    .as-size-xl.active {
      background: #A658FF;
    }
    .as-size-s.active span,
    .as-size-xl.active span {
      color: #FFFFFF;
    }
    .as-size-btn-any:hover {
      box-shadow: 0 0 10px 2px rgba(166,88,255,0.45);
    }

    /* Close button — top-right of panel */
    .as-close {
      position: absolute;
      right: 24px;
      top: 20px;
      width: 25px;
      height: 25px;
      z-index: 10;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s, transform 0.2s;
    }
    .as-close:hover { opacity: 1; transform: scale(1.15); }
    .as-close svg { width: 25px; height: 25px; }

    /* ── Mist overlay ── */
    @keyframes as-flicker {
      0%   { opacity: 0; }
      4%   { opacity: 0.07; }
      8%   { opacity: 0; }
      18%  { opacity: 0.11; }
      22%  { opacity: 0; }
      37%  { opacity: 0.05; }
      39%  { opacity: 0; }
      55%  { opacity: 0.09; }
      60%  { opacity: 0.03; }
      65%  { opacity: 0; }
      80%  { opacity: 0.08; }
      85%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes as-dim-pulse {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.28; }
    }
    .as-mist {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80,40,160,0.18) 0%, rgba(10,5,30,0.38) 70%, rgba(0,0,0,0.48) 100%);
      animation: as-dim-pulse 6s ease-in-out infinite, as-flicker 9s step-end infinite;
    }

    /* ── Entrance animation ── */
    @keyframes as-enter {
      from { opacity: 0; transform: translateY(18px); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0);    filter: none; }
    }
    .as-canvas .as-panel {
      animation: as-enter 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="canvas as-canvas" id="canvas">

      <!-- BGCO background -->
      <div class="as-bg" aria-hidden="true"></div>
      <!-- Rectangle 12: dark overlay -->
      <div class="as-overlay" aria-hidden="true"></div>
      <!-- Mist -->
      <div class="as-mist" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>

      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- Logo mark — links back to archive -->
      <a class="as-logo" href="archive.html" data-transition aria-label="Fukaimori — back to archive"></a>

      <!-- Drop point — top-right -->
      <a class="drop-point" href="droppoint.html" data-transition aria-label="Drop Point — submit recovered sequence">
        <span class="drop-text">DROP POINT</span>
        <span class="drop-dot" aria-hidden="true"></span>
      </a>

      <!-- ── Rectangle 19 / Group 109 — main panel ── -->
      <div class="as-panel">

        <!-- Close → back to archive -->
        <a class="as-close" href="archive.html" data-transition aria-label="Back to Archive">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 5L23 23M23 5L5 23" stroke="#C1AAFA" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </a>

        <!-- Group 103: top-left thumbnail -->
        <div class="as-img-top" aria-hidden="true"></div>
        <!-- Group 106: middle-left thumbnail -->
        <div class="as-img-mid" aria-hidden="true"></div>
        <!-- Group 105: bottom-left thumbnail -->
        <div class="as-img-bot" aria-hidden="true"></div>
        <!-- Group 102: main large image -->
        <div class="as-img-main" role="img" aria-label="Sesshomaru full illustration"></div>

        <!-- AW 001 -->
        <span class="as-id">AW 001</span>

        <!-- SESSHOMARU -->
        <h1 class="as-name">SESSHOMARU</h1>

        <!-- Prices -->
        <span class="as-price-old">Rp. 499.000</span>
        <span class="as-price-new">Rp. 399.000</span>

        <!-- Dashed line -->
        <div class="as-line" aria-hidden="true"></div>

        <!-- Description -->
        <span class="as-desc-label">Description</span>
        <!-- Dot -->
        <div class="as-dot" aria-hidden="true"></div>
        <p class="as-desc-body">Boba etiam ut bulla tea est potus dilectus singulari compositione saporum et textuum, quae in Taiwan annis 1980 orta sunt. Boba refert ad pilas masticas tapiocas in fundo potus.</p>

        <!-- Color -->
        <span class="as-color-label">Color</span>
        <button class="as-swatch-white" aria-label="Color: White"></button>
        <button class="as-swatch-black" aria-label="Color: Black"></button>

        <!-- Size -->
        <span class="as-size-label">Size</span>
        <button class="as-size-s" aria-label="Size S"><span>S</span></button>
        <button class="as-size-l active" aria-label="Size L (selected)"><span>L</span></button>
        <button class="as-size-xl" aria-label="Size XL"><span>XL</span></button>

      </div><!-- /.as-panel -->

    </div><!-- /.canvas -->
  </div><!-- /.viewport -->

  <script src="script.js"></script>
  <script>
    // Size button toggle
    var sizeBtns = document.querySelectorAll('.as-size-s, .as-size-l, .as-size-xl');
    sizeBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        sizeBtns.forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
      });
      btn.addEventListener('mouseenter', function() {
        this.style.boxShadow = '0 0 10px 2px rgba(166,88,255,0.45)';
      });
      btn.addEventListener('mouseleave', function() {
        if (!this.classList.contains('active')) {
          this.style.boxShadow = '';
        }
      });
    });

    // Color swatch toggle
    var swatches = document.querySelectorAll('.as-swatch-white, .as-swatch-black');
    swatches.forEach(function(sw) {
      sw.addEventListener('click', function() {
        swatches.forEach(function(s) { s.classList.remove('selected'); });
        this.classList.add('selected');
      });
    });
  </script>
</body>
</html>
