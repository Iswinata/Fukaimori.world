<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Drop Point. Submit your recovered sequence." />
  <title>Fukaimori · Drop Point</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="viewport">
    <div class="canvas dp-canvas" id="canvas">

      <!-- Background: BGLP.png -->
      <div class="dp-bg" aria-hidden="true"></div>

      <!-- Rectangle 12: dark overlay rgba(0,0,0,0.4) -->
      <div class="dp-overlay" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>

      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- BGDP: portrait image (left 642, top 194, 884×798) -->
      <div class="dp-portrait-img" aria-hidden="true"></div>

      <!-- Rectangle 14: border + gradient overlay -->
      <div class="dp-portrait" aria-hidden="true"></div>

      <!-- DROP POINT heading (centered, top 379, 342×66) -->
      <h1 class="dp-heading">DROP POINT</h1>

      <!-- SUBMIT YOUR RECOVERED SEQUENCE (centered, top 450) -->
      <p class="dp-sub">SUBMIT YOUR RECOVERED SEQUENCE</p>

      <!-- RECOVERED SEQUENCE label (left 717, top 517) -->
      <p class="dp-label">RECOVERED SEQUENCE</p>

      <!-- 9 input boxes (top 550) -->
      <div class="dp-seq" role="group" aria-label="Enter recovered sequence">
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 1" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 2" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 3" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 4" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 5" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 6" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 7" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 8" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 9" autocomplete="off" />
      </div>

      <!-- VERIFY button (left 972, top 670, 223×65) -->
      <button class="dp-verify" type="button">VERIFY</button>

      <!-- NEED ASSISTANCE? (centered, top 770) -->
      <p class="dp-assist-q">NEED ASSISTANCE?</p>

      <!-- ACCESS ARCHIVE NOTES + red dot — wrapped for vertical alignment -->
      <div class="dp-assist-row">
        <button class="dp-assist-link dp-assist-link--btn" type="button" id="open-archive-notes" aria-label="Access archive notes" aria-haspopup="dialog">
          ACCESS ARCHIVE NOTES
        </button>
        <span class="dp-assist-dot" aria-hidden="true"></span>
      </div>

      <!-- Close button: SVG icon 28×28 (left 1488, top 205) -->
      <a class="dp-close" href="index.html" data-transition aria-label="Close Drop Point">
        <span class="dp-close-line dp-close-line-1" aria-hidden="true"></span>
        <span class="dp-close-line dp-close-line-2" aria-hidden="true"></span>
      </a>

    </div>
  </div>

  <!-- ============ Archive Notes overlay ============ -->
  <div class="an-overlay" id="an-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="an-title">

    <!-- dim backdrop -->
    <div class="an-backdrop" id="an-backdrop"></div>

    <!-- panel: 884×800 centered, matches Figma Group 55 -->
    <div class="an-panel">

      <!-- BGDP portrait behind the panel -->
      <div class="an-portrait" aria-hidden="true"></div>

      <!-- Rectangle 14: gradient border overlay -->
      <div class="an-border" aria-hidden="true"></div>

      <!-- Close × (left 1488, top 205 → relative to panel: right side) -->
      <button class="an-close" id="an-close" type="button" aria-label="Close archive notes">
        <span class="an-close-line an-close-line-1" aria-hidden="true"></span>
        <span class="an-close-line an-close-line-2" aria-hidden="true"></span>
      </button>

      <!-- ARCHIVE NOTES heading (top 243) -->
      <h2 class="an-title" id="an-title">ARCHIVE NOTES</h2>

      <!-- SUBMIT YOUR RECOVERED SEQUENCE subtitle (top 314) -->
      <p class="an-sub">SUBMIT YOUR RECOVERED SQUENCE</p>

      <!-- 4 note rows (Group 70–73) -->

      <!-- Row 1 — ARCHIVE NOTE 001 (top 370) -->
      <div class="an-row" style="top:370px">
        <div class="an-row-circle">
          <div class="an-row-icon an-row-icon-1" aria-hidden="true"></div>
        </div>
        <span class="an-row-label">ARCHIVE NOTE 001</span>
        <button class="an-row-arrow" type="button" aria-label="View archive note 1">
          <span class="an-arrow-v1" aria-hidden="true"></span>
          <span class="an-arrow-v2" aria-hidden="true"></span>
        </button>
      </div>

      <!-- Row 2 — ARCHIVE NOTE 002 (top 504) -->
      <div class="an-row" style="top:504px">
        <div class="an-row-circle">
          <div class="an-row-icon an-row-icon-2" aria-hidden="true"></div>
        </div>
        <span class="an-row-label">ARCHIVE NOTE 002</span>
        <button class="an-row-arrow" type="button" aria-label="View archive note 2">
          <span class="an-arrow-v1" aria-hidden="true"></span>
          <span class="an-arrow-v2" aria-hidden="true"></span>
        </button>
      </div>

      <!-- Row 3 — ARCHIVE NOTE 003 (top 638) -->
      <div class="an-row" style="top:638px">
        <div class="an-row-circle">
          <div class="an-row-icon an-row-icon-3" aria-hidden="true"></div>
        </div>
        <span class="an-row-label">ARCHIVE NOTE 003</span>
        <button class="an-row-arrow" type="button" aria-label="View archive note 3">
          <span class="an-arrow-v1" aria-hidden="true"></span>
          <span class="an-arrow-v2" aria-hidden="true"></span>
        </button>
      </div>

      <!-- Row 4 — ARCHIVE NOTE 004 (top 772) -->
      <div class="an-row" style="top:772px">
        <div class="an-row-circle">
          <div class="an-row-icon an-row-icon-4" aria-hidden="true"></div>
        </div>
        <span class="an-row-label">ARCHIVE NOTE 004</span>
        <button class="an-row-arrow" type="button" aria-label="View archive note 4">
          <span class="an-arrow-v1" aria-hidden="true"></span>
          <span class="an-arrow-v2" aria-hidden="true"></span>
        </button>
      </div>

      <!-- Footer motto (top 925.29) -->
      <p class="an-motto">THE ARCHIVE REVEALS ONLY TO THOSE WHO SEEK</p>

    </div><!-- /an-panel -->
  </div><!-- /an-overlay -->

  <script src="script.js"></script>
</body>
</html>
