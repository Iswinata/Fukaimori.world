<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Access Granted." />
  <title>Fukaimori · Access Granted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:wght@400;700&family=Cantarell:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── Viewport scaler ── */
    .m-viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    /* Frame 263 — 474×814 */
    .m-frame {
      position: relative;
      width: 474px;
      height: 814px;
      background: #fff;
      overflow: hidden;
      flex-shrink: 0;
      transform-origin: center center;
    }

    /* BGM 2 — BGMN.png */
    .m-bg {
      position: absolute;
      width: 474px;
      height: 814px;
      left: calc(50% - 474px/2);
      top: calc(50% - 814px/2);
      background: url('BGMN.png') center/cover no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Group 143: Fukaimori logo header ── */
    .m-logo-group {
      position: absolute;
      width: 146.41px;
      height: 21px;
      left: calc(50% - 146.41px/2 + 0.21px);
      top: 34px;
      z-index: 5;
    }
    .m-logo-icon {
      position: absolute;
      width: 16.16px;
      height: 18.13px;
      left: 0;
      top: 2.13px;
      background: url('Subtract.png') center/contain no-repeat;
    }
    .m-logo-text {
      position: absolute;
      width: 122px;
      height: 21px;
      left: 24.41px;
      top: 0;
      font-family: 'Cantarell', sans-serif;
      font-weight: 700;
      font-size: 14.8308px;
      line-height: 21px;
      letter-spacing: 0.21em;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    /* ── ACCESS GRANTED ── */
    .m-heading {
      position: absolute;
      width: 304px;
      height: 41px;
      left: calc(50% - 304px/2);
      top: 235px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 34.2939px;
      line-height: 41px;
      text-align: center;
      color: #CFFFB5;
      z-index: 5;
      white-space: nowrap;
    }

    /* ── THE TRUTH ACKNOWLEDGES YOU ── */
    .m-sub {
      position: absolute;
      width: 273px;
      height: 19px;
      left: calc(50% - 273px/2 + 0.41px);
      top: 280.45px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 16.1463px;
      line-height: 19px;
      text-align: center;
      color: #C4FFE2;
      z-index: 5;
      white-space: nowrap;
    }

    /* ── logosuc image ── */
    .m-logo-success {
      position: absolute;
      width: 161.97px;
      height: 162.49px;
      left: calc(50% - 161.97px/2 + 0.57px);
      top: 320.22px;
      background: url('logosuc.png') center/contain no-repeat;
      mix-blend-mode: difference;
      z-index: 5;
    }

    /* ── YOU MAY CLAIM WHAT IS YOURS. ── */
    .m-claim-text {
      position: absolute;
      width: 289px;
      height: 21px;
      left: calc(50% - 289px/2 + 0.46px);
      top: 503.17px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 17.7777px;
      line-height: 21px;
      text-align: center;
      color: #CFFFB5;
      z-index: 5;
      white-space: nowrap;
    }

    /* ── CLAIM REWARD button (Rectangle 16 + label) ── */
    .m-claim-btn {
      position: absolute;
      width: 194px;
      height: 39.35px;
      left: 140px;
      top: 531.83px;
      background: rgba(55, 22, 255, 0.19);
      border: 0.733803px solid #786BC7;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 14.5661px;
      line-height: 17px;
      text-align: center;
      color: #BFB4FF;
      cursor: pointer;
      z-index: 6;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .m-claim-btn:hover,
    .m-claim-btn:focus-visible {
      background: rgba(55, 22, 255, 0.32);
      box-shadow: 0 0 14px rgba(105, 78, 171, 0.5);
      outline: none;
    }

    /* ── Mist overlay ── */
    .m-mist {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(40,120,80,0.12) 0%, rgba(10,5,30,0.35) 70%, rgba(0,0,0,0.5) 100%);
      animation: m-dim 6s ease-in-out infinite;
    }
    @keyframes m-dim { 0%,100%{opacity:.18} 50%{opacity:.28} }

    /* ── Entrance animation ── */
    @keyframes m-enter {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .m-logo-group,
    .m-heading,
    .m-sub,
    .m-logo-success,
    .m-claim-text,
    .m-claim-btn {
      animation: m-enter 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }
    .m-heading      { animation-delay: 0.2s; }
    .m-sub          { animation-delay: 0.32s; }
    .m-logo-success { animation-delay: 0.44s; }
    .m-claim-text   { animation-delay: 0.56s; }
    .m-claim-btn    { animation-delay: 0.68s; }

    /* ── Green glow pulse on the success icon ── */
    @keyframes m-glow {
      0%,100% { filter: drop-shadow(0 0 8px rgba(100,255,180,0.4)); }
      50%     { filter: drop-shadow(0 0 18px rgba(100,255,180,0.75)); }
    }
    .m-logo-success { animation: m-enter 0.8s cubic-bezier(0.22,1,.36,1) 0.44s both, m-glow 3s ease-in-out 1.2s infinite; }

    /* ── Page transition ── */
    .m-transition {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
      transition: opacity 0.45s ease;
    }
    .m-transition.fade-out { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <div class="m-viewport" id="mViewport">
    <div class="m-frame" id="mFrame">

      <!-- Background -->
      <div class="m-bg" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="m-starfield" aria-hidden="true" style="position:absolute;inset:0;width:474px;height:814px;z-index:2;pointer-events:none;display:block;"></canvas>

      <!-- Mist -->
      <div class="m-mist" aria-hidden="true"></div>

      <!-- Logo header -->
      <div class="m-logo-group" role="banner">
        <div class="m-logo-icon" aria-hidden="true"></div>
        <span class="m-logo-text">FUKAIMORI</span>
      </div>

      <!-- ACCESS GRANTED -->
      <h1 class="m-heading">ACCESS GRANTED</h1>

      <!-- THE TRUTH ACKNOWLEDGES YOU -->
      <p class="m-sub">THE TRUTH ACKNOWLEDGES YOU</p>

      <!-- Success logo -->
      <div class="m-logo-success" aria-hidden="true"></div>

      <!-- YOU MAY CLAIM WHAT IS YOURS. -->
      <p class="m-claim-text">YOU MAY CLAIM WHAT IS YOURS.</p>

      <!-- CLAIM REWARD button -->
      <a class="m-claim-btn" href="claim.html" id="mClaimBtn" aria-label="Claim your reward">CLAIM REWARD</a>

      <!-- Page transition overlay -->
      <div class="m-transition" id="mTransition" aria-hidden="true"></div>

    </div>
  </div>

  <script>
    /* ── Scale frame to fill viewport (cover) ── */
    (function () {
      var frame = document.getElementById('mFrame');
      var W = 474, H = 814;
      function scale() {
        var vw = window.innerWidth, vh = window.innerHeight;
        var s = Math.max(vw / W, vh / H);
        frame.style.transform = 'scale(' + s + ')';
      }
      scale();
      window.addEventListener('resize', scale);
    })();

    /* ── Claim button: fade transition ── */
    (function () {
      var btn   = document.getElementById('mClaimBtn');
      var trans = document.getElementById('mTransition');
      if (!btn || !trans) return;
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        var href = btn.getAttribute('href');
        trans.classList.add('fade-out');
        setTimeout(function () { window.location.href = href; }, 450);
      });
    })();

    /* ── Feather particles ── */
    (function initFeathers() {
      var cvs = document.querySelector('.m-starfield');
      if (!cvs) return;
      var ctx = cvs.getContext('2d');
      var W = 474, H = 814;
      cvs.width = W; cvs.height = H;
      var feathers = [], NUM = 40;
      var palette = [
        [180,100,255],[210,140,255],[150,70,230],
        [220,160,255],[130,50,210],[255,200,255],[170,90,255]
      ];
      function rnd() {
        var col = palette[Math.floor(Math.random()*palette.length)];
        return { x:Math.random()*W, y:Math.random()*H,
          angle:Math.random()*Math.PI*2, drift:Math.random()*Math.PI*2,
          spin:(Math.random()-0.5)*0.018, speed:Math.random()*0.18+0.04,
          len:Math.random()*18+6, width:Math.random()*1.4+0.4, col:col,
          baseAlpha:Math.random()*0.5+0.3,
          twinklePeriod:Math.random()*160+70, twinklePhase:Math.random()*Math.PI*2 };
      }
      for (var i=0;i<NUM;i++) feathers.push(rnd());
      var frame=0;
      function draw() {
        ctx.clearRect(0,0,W,H); frame++;
        for (var j=0;j<feathers.length;j++) {
          var f=feathers[j];
          f.x+=Math.cos(f.drift)*f.speed; f.y+=Math.sin(f.drift)*f.speed; f.angle+=f.spin;
          if(f.x<-f.len)f.x=W+f.len; if(f.x>W+f.len)f.x=-f.len;
          if(f.y<-f.len)f.y=H+f.len; if(f.y>H+f.len)f.y=-f.len;
          var tw=Math.sin(frame/f.twinklePeriod*Math.PI*2+f.twinklePhase);
          var fa=Math.max(0.06,Math.min(0.92,f.baseAlpha+tw*0.28));
          ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.angle);
          var g=ctx.createLinearGradient(-f.len/2,0,f.len/2,0);
          g.addColorStop(0,'rgba('+f.col+',0)');
          g.addColorStop(0.25,'rgba('+f.col+','+(fa*0.5).toFixed(2)+')');
          g.addColorStop(0.5,'rgba('+f.col+','+fa.toFixed(2)+')');
          g.addColorStop(0.75,'rgba('+f.col+','+(fa*0.5).toFixed(2)+')');
          g.addColorStop(1,'rgba('+f.col+',0)');
          ctx.shadowColor='rgba('+f.col+','+(fa*0.9).toFixed(2)+')';
          ctx.shadowBlur=8; ctx.beginPath();
          ctx.moveTo(-f.len/2,0); ctx.lineTo(f.len/2,0);
          ctx.strokeStyle=g; ctx.lineWidth=f.width*2.2; ctx.stroke();
          ctx.restore();
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
