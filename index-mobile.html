<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — An Archive. Exploring the depths of humanity." />
  <title>Fukaimori · An Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Cantarell:wght@400;700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Fukaimori · Mobile Index
       Design base: 474 × 814 px (Figma Frame 253)
       JS scales the 474×814 canvas to COVER the device viewport
       so it always fills the full screen on every mobile size.
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #05020a;
      overflow: hidden;
    }

    /* Full-viewport centering stage */
    .mob-viewport {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05020a;
      overflow: hidden;
    }

    /* ── Design canvas: 474 × 814 — scaled by JS to cover the screen ── */
    .mob-canvas {
      position: relative;
      width: 474px;
      height: 814px;
      flex: none;
      overflow: hidden;
      transform: scale(var(--mob-scale, 1));
      transform-origin: center center;
    }

    /* ── Background: BGM.png covers the canvas exactly ── */
    .mob-bg {
      position: absolute;
      width: 474px;
      height: 814px;
      left: 0;
      top: 0;
      background: url("BGM.png") center center / cover no-repeat;
      z-index: 1;
    }

    /* ── Animated feather particles ── */
    .mob-starfield {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      display: block;
    }

    /* ── Hamburger — Group 168: left 27, top 38, size 20.22 × 12.77 ── */
    /* Three lines: Vector 5 (top 38), Vector 6 (top 44.39), Vector 7 (top 50.77) */
    .mob-hamburger {
      position: absolute;
      left: 27px;
      top: 38px;
      width: 20.22px;
      height: 12.77px;
      z-index: 9;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      /* ensure button doesn't stretch */
      appearance: none;
      -webkit-appearance: none;
    }
    .mob-hamburger-line {
      display: block;
      width: 20.22px;
      height: 0;
      border-top: 2.12889px solid #7960FF;
      border-radius: 1px;
    }

    /* ── Brand — Group 143: centered, top 34, size 146.41 × 21 ── */
    /* Figma: left = calc(50% - 146.41px/2 + 0.21px) */
    .mob-brand {
      position: absolute;
      width: 146.41px;
      height: 21px;
      left: calc(50% - 146.41px / 2 + 0.21px);
      top: 34px;
      z-index: 9;
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Subtract mark — Figma: left 164, top 36.13, size 16.16 × 18.13
       Relative within brand: 164 - (237 - 73.205 + 0.21) = 164 - 163.995 ≈ 0px
       Flex handles alignment naturally, mark comes first. */
    .mob-brand-mark {
      flex-shrink: 0;
      width: 16.16px;
      height: 18.13px;
      background: url("Subtract.png") center center / contain no-repeat;
    }

    /* FUKAIMORI — Figma: width 122, height 21, Cantarell 700 14.8308px, letter 0.21em */
    .mob-brand-text {
      font-family: 'Cantarell', system-ui, sans-serif;
      font-weight: 700;
      font-size: 14.8308px;
      line-height: 21px;
      letter-spacing: 0.21em;
      white-space: nowrap;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── BGLPM moon — Figma: left 197, top 329, size 79 × 80 ── */
    .mob-moon {
      position: absolute;
      width: 79px;
      height: 80px;
      left: 197px;
      top: 329px;
      background: url("BGLPM.png") center center / 100% 100% no-repeat;
      z-index: 4;
      pointer-events: none;
    }

    /* ── Moon portal hitbox — same position/size as moon, circular pulse ── */
    .mob-moon-link {
      position: absolute;
      width: 79px;
      height: 80px;
      left: 197px;
      top: 329px;
      z-index: 5;
      border-radius: 50%;
      display: block;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      animation: mob-moon-pulse 3s ease-in-out infinite;
    }
    .mob-moon-link:focus-visible {
      outline: 2px solid rgba(105, 78, 171, 0.8);
      outline-offset: 4px;
    }
    @keyframes mob-moon-pulse {
      0%, 100% {
        box-shadow:
          0 0 12px 6px rgba(60, 20, 100, 0.45),
          0 0 28px 12px rgba(80, 30, 130, 0.3),
          0 0 55px 24px rgba(60, 20, 100, 0.18);
      }
      50% {
        box-shadow:
          0 0 20px 10px rgba(90, 40, 160, 0.7),
          0 0 45px 20px rgba(70, 25, 120, 0.5),
          0 0 80px 40px rgba(50, 15, 90, 0.3);
      }
    }

    /* ── Title group — Group 52: centered, top 681, size 262 × 38.74, rotate -0.3deg ── */
    /* Figma: left = calc(50% - 262px/2) = 106px on 474px canvas */
    .mob-title-group {
      position: absolute;
      width: 262px;
      height: 38.74px;
      left: calc(50% - 262px / 2);
      top: 681px;
      transform: rotate(-0.3deg);
      z-index: 8;
    }

    /* AN ARCHIVE — Figma absolute: left 159.17, top 681.27
       Group left = 106px → relative left = 159.17 - 106 = 53.17px
       top relative = 681.27 - 681 = 0.27px */
    .mob-title {
      position: absolute;
      width: 157px;
      height: 20px;
      left: 53.17px;
      top: 0.27px;
      font-family: 'Bona Nova', Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 16.9464px;
      line-height: 20px;
      text-align: center;
      letter-spacing: 0.31em;
      color: #FFFFFF;
      white-space: nowrap;
      text-shadow:
        0 0 3px rgba(197, 188, 255, 0.55),
        0 0 8px rgba(150, 105, 255, 0.4),
        0 0 16px rgba(105, 78, 171, 0.28);
    }

    /* EXPLORING THE DEPTHS OF HUMANITY — Figma absolute: left 106.14, top 708.74
       Group left = 106px → relative left = 106.14 - 106 = 0.14px
       top relative = 708.74 - 681 = 27.74px */
    .mob-subtitle {
      position: absolute;
      width: 262px;
      height: 11px;
      left: 0.14px;
      top: 27.74px;
      font-family: 'Bona Nova', Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 9.53914px;
      line-height: 11px;
      text-align: center;
      letter-spacing: 0.25em;
      color: #FFFFFF;
      white-space: nowrap;
      text-shadow:
        0 0 3px rgba(197, 188, 255, 0.55),
        0 0 8px rgba(150, 105, 255, 0.4),
        0 0 16px rgba(105, 78, 171, 0.28);
    }

    /* ── Nav menu overlay — Frame 267 ── */
    /* Rectangle 53: full canvas blur/dim layer */
    .mob-nav-overlay {
      position: absolute;
      width: 474px;
      height: 814px;
      left: 0;
      top: 0;
      z-index: 20;
      background: rgba(5, 0, 34, 0.54);
      backdrop-filter: blur(7.2px);
      -webkit-backdrop-filter: blur(7.2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .mob-nav-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    /* Close button (SVG icon) — left 22, top 32, size 25×25 */
    .mob-nav-close {
      position: absolute;
      left: 22px;
      top: 32px;
      width: 25px;
      height: 25px;
      background: none;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      -webkit-appearance: none;
    }
    .mob-nav-close svg {
      width: 25px;
      height: 25px;
      display: block;
    }
    /* Nav links */
    .mob-nav-link {
      position: absolute;
      height: 33px;
      font-family: 'Bona Nova', Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 27.2613px;
      line-height: 33px;
      text-align: center;
      letter-spacing: 0.12em;
      color: #B5A9FF;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }
    .mob-nav-link:active {
      color: #ffffff;
      text-shadow: 0 0 12px rgba(180,160,255,0.8);
    }
    /* DROP POINT — left calc(50% - 200px/2 - 0.25px), top 127 */
    .mob-nav-droppoint {
      width: 200px;
      left: calc(50% - 100px - 0.25px);
      top: 127px;
    }
    /* ARCHIVE NOTE — left calc(50% - 241px/2 - 0.5px), top 195 */
    .mob-nav-archive {
      width: 241px;
      left: calc(50% - 120.5px - 0.5px);
      top: 195px;
    }
    /* Brand visible in overlay — same position as main brand (z-index above overlay) */
    .mob-nav-brand {
      position: absolute;
      width: 146.41px;
      height: 21px;
      left: calc(50% - 146.41px / 2 + 0.21px);
      top: 34px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      pointer-events: none;
    }
    .mob-nav-brand-mark {
      flex-shrink: 0;
      width: 16.16px;
      height: 18.13px;
      background: url("Subtract.png") center center / contain no-repeat;
    }
    .mob-nav-brand-text {
      font-family: 'Cantarell', system-ui, sans-serif;
      font-weight: 700;
      font-size: 14.8308px;
      line-height: 21px;
      letter-spacing: 0.21em;
      white-space: nowrap;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Page transition overlay ── */
    .mob-page-transition {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      background: #05020a;
      opacity: 0;
      animation: none;
    }
    .mob-page-transition.is-leaving {
      pointer-events: all;
      animation: mob-pt-fade-out 0.35s ease forwards;
    }
    .mob-page-transition.is-entering {
      opacity: 1;
      pointer-events: none;
      animation: mob-pt-fade-in 0.4s ease forwards;
    }
    @keyframes mob-pt-fade-out {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes mob-pt-fade-in {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="mob-viewport">
    <div class="mob-canvas" id="mobCanvas">

      <!-- BGM.png background -->
      <div class="mob-bg" aria-hidden="true"></div>

      <!-- Feather / star particles canvas -->
      <canvas class="mob-starfield" aria-hidden="true"></canvas>

      <!-- Hamburger — opens nav overlay -->
      <button class="mob-hamburger" id="mobHamburger" aria-label="Open navigation menu" aria-expanded="false">
        <span class="mob-hamburger-line"></span>
        <span class="mob-hamburger-line"></span>
        <span class="mob-hamburger-line"></span>
      </button>

      <!-- Nav overlay — Frame 267 (Rectangle 53: blur/dim + nav links) -->
      <div class="mob-nav-overlay" id="mobNavOverlay" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Navigation">

        <!-- Close X icon — left 22, top 32, size 25×25, fill #7960FF -->
        <button class="mob-nav-close" id="mobNavClose" aria-label="Close navigation">
          <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Vector: left 17.08%, right 17.09%, top 17.09%, bottom 17.08% → inner path -->
            <path d="M4.27 4.27L20.73 20.73M20.73 4.27L4.27 20.73" stroke="#7960FF" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>

        <!-- Brand — Group 143: centered, top 34 -->
        <div class="mob-nav-brand" aria-hidden="true">
          <span class="mob-nav-brand-mark"></span>
          <span class="mob-nav-brand-text">FUKAIMORI</span>
        </div>

        <!-- DROP POINT — top 127 -->
        <a class="mob-nav-link mob-nav-droppoint" href="droppoint.html">DROP POINT</a>
        <!-- ARCHIVE NOTE — top 195 -->
        <a class="mob-nav-link mob-nav-archive" href="keynote.html">ARCHIVE NOTE</a>

      </div>

      <!-- Brand logo — Group 143 (Subtract mark + FUKAIMORI text) → Archive -->
      <a class="mob-brand" href="archive.html" aria-label="Fukaimori — Enter the archive">
        <span class="mob-brand-mark" aria-hidden="true"></span>
        <span class="mob-brand-text">FUKAIMORI</span>
      </a>

      <!-- BGLPM moon image (bulan di tengah) -->
      <div class="mob-moon" aria-hidden="true"></div>

      <!-- Moon portal hitbox — pulsing ring, tap to enter archive -->
      <a class="mob-moon-link" href="archive.html" aria-label="Enter the archive"></a>

      <!-- Title block — Group 52 (AN ARCHIVE + subtitle) -->
      <div class="mob-title-group" aria-hidden="true">
        <p class="mob-title">AN ARCHIVE</p>
        <p class="mob-subtitle">EXPLORING THE DEPTHS OF HUMANITY</p>
      </div>

    </div>
  </div>

  <!-- Page transition overlay -->
  <div class="mob-page-transition" id="mobPageTransition" aria-hidden="true"></div>

  <script>
    (function () {
      'use strict';

      /* ────────────────────────────────────────────────────────
         Scale the 474 × 814 canvas to COVER the viewport.
         Math.max ensures no background gaps on any screen size.
      ──────────────────────────────────────────────────────── */
      (function scaler() {
        var canvas = document.getElementById('mobCanvas');
        if (!canvas) return;
        var DW = 474, DH = 814;

        function apply() {
          var vw = window.innerWidth;
          var vh = window.innerHeight || document.documentElement.clientHeight;
          // COVER: scale by the LARGER axis ratio so canvas fills screen
          var scale = Math.max(vw / DW, vh / DH);
          canvas.style.setProperty('--mob-scale', String(scale));
        }

        apply();
        window.addEventListener('resize', apply);
        window.addEventListener('orientationchange', function () {
          setTimeout(apply, 100);
        });
      })();

      /* ────────────────────────────────────────────────────────
         Page transition — fade in on load, fade out on navigate
      ──────────────────────────────────────────────────────── */
      (function initTransition() {
        var overlay = document.getElementById('mobPageTransition');
        if (!overlay) return;

        // Safety: clear stuck is-leaving state
        if (overlay.classList.contains('is-leaving')) {
          overlay.classList.remove('is-leaving');
          overlay.style.opacity = '0';
          overlay.style.animation = 'none';
          void overlay.offsetWidth;
          overlay.style.opacity = '';
          overlay.style.animation = '';
        }

        // Fade in on first load
        overlay.classList.add('is-entering');
        overlay.addEventListener('animationend', function onIn() {
          overlay.classList.remove('is-entering');
          overlay.removeEventListener('animationend', onIn);
        });

        // bfcache restore (back/forward navigation)
        window.addEventListener('pageshow', function (e) {
          if (!e.persisted) return;
          overlay.classList.remove('is-leaving', 'is-entering');
          overlay.style.opacity = '0';
          overlay.style.animation = 'none';
          void overlay.offsetWidth;
          overlay.style.opacity = '';
          overlay.style.animation = '';
          overlay.classList.add('is-entering');
          overlay.addEventListener('animationend', function onR() {
            overlay.classList.remove('is-entering');
            overlay.removeEventListener('animationend', onR);
          });
        });

        function navigate(href) {
          overlay.classList.remove('is-entering');
          overlay.classList.add('is-leaving');
          overlay.addEventListener('animationend', function onLeft() {
            overlay.removeEventListener('animationend', onLeft);
            window.location.href = href;
          });
        }

        // Intercept all anchor nav (except moon-link and nav overlay links handled separately)
        document.querySelectorAll('a[href]').forEach(function (link) {
          if (link.classList.contains('mob-moon-link')) return;
          if (link.closest('#mobNavOverlay')) return; // nav overlay handles its own nav
          var href = link.getAttribute('href');
          if (!href || href === '#') return;
          link.addEventListener('click', function (e) {
            e.preventDefault();
            navigate(href);
          });
        });

        // Nav overlay links — close overlay then navigate with transition
        document.querySelectorAll('#mobNavOverlay a[href]').forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            var href = link.getAttribute('href');
            navigate(href);
          });
        });
      })();

      /* ────────────────────────────────────────────────────────
         Nav overlay — open on hamburger tap, close on X
      ──────────────────────────────────────────────────────── */
      (function initNavOverlay() {
        var hamburger = document.getElementById('mobHamburger');
        var overlay   = document.getElementById('mobNavOverlay');
        var closeBtn  = document.getElementById('mobNavClose');
        if (!hamburger || !overlay) return;

        function openNav() {
          overlay.classList.add('open');
          overlay.setAttribute('aria-hidden', 'false');
          hamburger.setAttribute('aria-expanded', 'true');
        }

        function closeNav() {
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
          hamburger.setAttribute('aria-expanded', 'false');
        }

        hamburger.addEventListener('click', openNav);
        if (closeBtn) closeBtn.addEventListener('click', closeNav);

        // Tap outside the overlay links/close area to dismiss
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeNav();
        });
      })();

      /* ────────────────────────────────────────────────────────
         Moon portal tap — ripple rings then navigate to archive
      ──────────────────────────────────────────────────────── */
      (function initMoonTap() {
        var link = document.querySelector('.mob-moon-link');
        if (!link) return;

        link.addEventListener('click', function (e) {
          e.preventDefault();
          var rect = link.getBoundingClientRect();
          var cx   = rect.left + rect.width  / 2;
          var cy   = rect.top  + rect.height / 2;
          var size = Math.max(rect.width, rect.height);

          for (var i = 0; i < 3; i++) {
            (function (delay) {
              var ring = document.createElement('div');
              ring.style.cssText = [
                'position:fixed',
                'border-radius:50%',
                'border:2px solid rgba(160,80,255,0.85)',
                'box-shadow:0 0 10px 3px rgba(160,80,255,0.5)',
                'pointer-events:none',
                'z-index:98',
                'left:'        + cx          + 'px',
                'top:'         + cy          + 'px',
                'width:'       + size        + 'px',
                'height:'      + size        + 'px',
                'margin-left:' + (-size / 2) + 'px',
                'margin-top:'  + (-size / 2) + 'px',
                'transform:scale(1)',
                'opacity:1',
                'transition:none'
              ].join(';');
              document.body.appendChild(ring);

              setTimeout(function () {
                ring.style.transition = 'transform 1.0s ease-out, opacity 1.0s ease-out';
                ring.style.transform  = 'scale(4.5)';
                ring.style.opacity    = '0';
              }, delay);

              setTimeout(function () { ring.remove(); }, delay + 1100);
            })(i * 280);
          }

          // Navigate after the last ripple starts
          setTimeout(function () {
            var ov = document.getElementById('mobPageTransition');
            if (ov) {
              ov.classList.remove('is-entering');
              ov.classList.add('is-leaving');
              ov.addEventListener('animationend', function onLeft() {
                ov.removeEventListener('animationend', onLeft);
                window.location.href = 'archive.html';
              });
            } else {
              window.location.href = 'archive.html';
            }
          }, 650);
        });
      })();

      /* ────────────────────────────────────────────────────────
         Glowing feather / star particles on the canvas
      ──────────────────────────────────────────────────────── */
      (function initFeathers() {
        var cvs = document.querySelector('.mob-starfield');
        if (!cvs) return;
        var ctx = cvs.getContext('2d');
        var W, H, feathers = [];
        var NUM = 40;
        var palette = [
          [180, 100, 255], [210, 140, 255], [150,  70, 230],
          [220, 160, 255], [130,  50, 210], [255, 200, 255], [170, 90, 255]
        ];

        function resize() {
          var p = cvs.parentElement;
          W = cvs.width  = p ? p.offsetWidth  : 474;
          H = cvs.height = p ? p.offsetHeight : 814;
        }

        function rndFeather() {
          var col = palette[Math.floor(Math.random() * palette.length)];
          return {
            x:             Math.random() * (W || 474),
            y:             Math.random() * (H || 814),
            angle:         Math.random() * Math.PI * 2,
            drift:         Math.random() * Math.PI * 2,
            spin:          (Math.random() - 0.5) * 0.018,
            speed:         Math.random() * 0.18 + 0.04,
            len:           Math.random() * 18 + 6,
            width:         Math.random() * 1.4 + 0.4,
            col:           col,
            baseAlpha:     Math.random() * 0.5 + 0.3,
            twinklePeriod: Math.random() * 160 + 70,
            twinklePhase:  Math.random() * Math.PI * 2
          };
        }

        function initAll() {
          feathers = [];
          for (var i = 0; i < NUM; i++) feathers.push(rndFeather());
        }

        var frame = 0;
        function draw() {
          ctx.clearRect(0, 0, W, H);
          frame++;
          for (var j = 0; j < feathers.length; j++) {
            var f = feathers[j];
            f.x += Math.cos(f.drift) * f.speed;
            f.y += Math.sin(f.drift) * f.speed;
            f.angle += f.spin;
            if (f.x < -f.len) f.x = W + f.len;
            if (f.x > W + f.len) f.x = -f.len;
            if (f.y < -f.len) f.y = H + f.len;
            if (f.y > H + f.len) f.y = -f.len;

            var tw = Math.sin(frame / f.twinklePeriod * Math.PI * 2 + f.twinklePhase);
            var fa = Math.max(0.06, Math.min(0.92, f.baseAlpha + tw * 0.28));

            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.rotate(f.angle);

            var g = ctx.createLinearGradient(-f.len / 2, 0, f.len / 2, 0);
            g.addColorStop(0,    'rgba(' + f.col + ',0)');
            g.addColorStop(0.25, 'rgba(' + f.col + ',' + (fa * 0.5).toFixed(2) + ')');
            g.addColorStop(0.5,  'rgba(' + f.col + ',' + fa.toFixed(2) + ')');
            g.addColorStop(0.75, 'rgba(' + f.col + ',' + (fa * 0.5).toFixed(2) + ')');
            g.addColorStop(1,    'rgba(' + f.col + ',0)');

            ctx.shadowColor = 'rgba(' + f.col + ',' + (fa * 0.9).toFixed(2) + ')';
            ctx.shadowBlur  = 8;
            ctx.beginPath();
            ctx.moveTo(-f.len / 2, 0);
            ctx.lineTo( f.len / 2, 0);
            ctx.strokeStyle = g;
            ctx.lineWidth   = f.width * 2.2;
            ctx.stroke();
            ctx.restore();
          }
          requestAnimationFrame(draw);
        }

        resize();
        initAll();
        draw();
        window.addEventListener('resize', function () { resize(); initAll(); });
      })();

    })();
  </script>
</body>
</html>
