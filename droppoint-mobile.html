<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Drop Point. Submit your recovered sequence." />
  <title>Fukaimori · Drop Point</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:wght@400;700&family=Maven+Pro:wght@400;500&family=Cantarell:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── Scaler: always fills viewport, locks 474×814 ── */
    .m-viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    /* Frame 262 — 474×814 canvas */
    .m-frame {
      position: relative;
      width: 474px;
      height: 814px;
      background: #000;
      overflow: hidden;
      flex-shrink: 0;
      transform-origin: center center;
    }

    /* BGM 2 — BGMN.png fills the full frame */
    .m-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: url('BGMN.png') center/cover no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Group 143: Fukaimori header ── */
    .m-logo-group {
      position: absolute;
      width: 146.41px;
      height: 21px;
      left: calc(50% - 146.41px/2 + 0.21px);
      top: 34px;
      z-index: 5;
    }
    .m-logo-icon {
      position: absolute;
      width: 16.16px;
      height: 18.13px;
      left: 0;
      top: 2.13px;
      background: url('Subtract.png') center/contain no-repeat;
    }
    .m-logo-text {
      position: absolute;
      width: 122px;
      height: 21px;
      left: 24.41px;
      top: 0;
      font-family: 'Cantarell', sans-serif;
      font-weight: 700;
      font-size: 14.8308px;
      line-height: 21px;
      letter-spacing: 0.21em;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    /* ── Group 149: DROP POINT + subtitle ── */
    .m-dp-heading {
      position: absolute;
      width: 217px;
      height: 42px;
      left: calc(50% - 217px/2 + 0.43px);
      top: 270px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 34.8144px;
      line-height: 42px;
      text-align: center;
      color: #A99AFF;
      z-index: 5;
      white-space: nowrap;
    }
    .m-dp-sub {
      position: absolute;
      width: 460px;
      height: 23px;
      left: calc(50% - 460px/2);
      top: 316.14px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 16.5px;
      line-height: 23px;
      text-align: center;
      color: #CFB7FF;
      z-index: 5;
      white-space: nowrap;
      overflow: visible;
      letter-spacing: 0.02em;
    }

    /* RECOVERED SEQUENCE label */
    .m-dp-label {
      position: absolute;
      width: 240px;
      height: 19px;
      left: calc(50% - 240px/2);
      top: 362.29px;
      font-family: 'Maven Pro', sans-serif;
      font-weight: 500;
      font-size: 13.5px;
      line-height: 19px;
      text-align: center;
      color: #A99AFF;
      z-index: 5;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* ── Group 158: 6 input boxes ── */
    .m-seq-box {
      position: absolute;
      top: 389.97px;
      width: 46.14px;
      height: 46.14px;
      border: 0.772531px solid #786BC7;
      background: transparent;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 22px;
      text-align: center;
      color: #C1AAFA;
      outline: none;
      caret-color: #A99AFF;
      z-index: 6;
      text-transform: uppercase;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .m-seq-box:nth-child(1) { left: 77.3px; }
    .m-seq-box:nth-child(2) { left: 131.64px; }
    .m-seq-box:nth-child(3) { left: 185.97px; }
    .m-seq-box:nth-child(4) { left: 240.3px; }
    .m-seq-box:nth-child(5) { left: 294.64px; }
    .m-seq-box:nth-child(6) { left: 348.97px; }
    .m-seq-box:focus { border-color: #A99AFF; box-shadow: 0 0 8px rgba(155,100,255,0.4); }
    .m-seq-box.wrong { border-color: #FF2D2D; color: #FF2D2D; }
    .m-seq-box.correct {
      border-color: #3DFF8F; color: #3DFF8F;
      box-shadow: 0 0 10px rgba(61,255,143,0.5);
      background: rgba(61,255,143,0.05);
    }

    /* Shake group wrapper */
    .m-seq-group {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }
    .m-seq-group .m-seq-box { pointer-events: auto; }
    @keyframes m-shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .m-seq-group.shake .m-seq-box { animation: m-shake 0.4s ease; }

    /* ── Group 58: VERIFY button ── */
    .m-verify {
      position: absolute;
      width: 131.99px;
      height: 39.45px;
      left: calc(50% - 131.99px/2 + 1.09px);
      top: 445.35px;
      background: rgba(55, 22, 255, 0.19);
      border: 0.744598px solid #786BC7;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400;
      font-size: 14.9441px;
      line-height: 18px;
      text-align: center;
      color: #786BC7;
      cursor: pointer;
      z-index: 6;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .m-verify:hover, .m-verify:focus-visible {
      background: rgba(55,22,255,0.32);
      box-shadow: 0 0 14px rgba(105,78,171,0.5);
      outline: none;
    }
    .m-verify:disabled { opacity: 0.6; cursor: default; }

    /* ── Group 75: assistance ── */
    .m-assist-q {
      position: absolute;
      width: 130px;
      height: 17px;
      left: calc(50% - 130px/2 - 0.08px);
      top: 497.64px;
      font-family: 'Maven Pro', sans-serif;
      font-weight: 500;
      font-size: 14.2243px;
      line-height: 17px;
      color: rgba(226, 214, 255, 0.59);
      z-index: 5;
      white-space: nowrap;
    }
    .m-assist-link {
      position: absolute;
      width: 153px;
      height: 16px;
      left: calc(50% - 153px/2 - 7.06px);
      top: 518.9px;
      font-family: 'Maven Pro', sans-serif;
      font-weight: 500;
      font-size: 13.285px;
      line-height: 16px;
      text-align: center;
      color: rgba(226, 214, 255, 0.59);
      text-decoration: none;
      z-index: 6;
      white-space: nowrap;
      transition: color 0.2s ease;
    }
    .m-assist-link:hover, .m-assist-link:focus-visible {
      color: rgba(226,214,255,0.9);
      outline: none;
    }

    /* Ellipse 14 — red dot */
    .m-dot {
      position: absolute;
      width: 9.24px;
      height: 9.24px;
      left: 311.47px;
      top: 522.59px;
      background: #FF2D2D;
      border-radius: 50%;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease, background 0.3s ease;
    }
    .m-dot.active {
      opacity: 1;
      animation: m-dot-pulse 2.2s ease-in-out infinite;
    }
    .m-dot.purple {
      opacity: 1;
      background: #9B6FFF;
      animation: m-dot-purple 1.4s ease-in-out infinite;
    }
    @keyframes m-dot-pulse {
      0%,100% { box-shadow: 0 0 3px 1px rgba(255,45,45,0.55); }
      50%      { box-shadow: 0 0 5px 2px rgba(255,45,45,0.75); }
    }
    @keyframes m-dot-purple {
      0%,100% { box-shadow: 0 0 4px 1px rgba(155,111,255,0.6); }
      50%      { box-shadow: 0 0 7px 3px rgba(155,111,255,0.85); }
    }

    /* ── Entrance animation ── */
    @keyframes m-enter {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .m-logo-group,
    .m-dp-heading,
    .m-dp-sub,
    .m-dp-label,
    .m-seq-box,
    .m-verify,
    .m-assist-q,
    .m-assist-link {
      animation: m-enter 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }

    /* ── Mist overlay ── */
    @keyframes m-dim {
      0%,100% { opacity: 0.18; }
      50%     { opacity: 0.30; }
    }
    .m-mist {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80,40,160,0.18) 0%, rgba(10,5,30,0.4) 70%, rgba(0,0,0,0.5) 100%);
      animation: m-dim 6s ease-in-out infinite;
    }

    /* ── Page transition overlay ── */
    .m-transition {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
      transition: opacity 0.45s ease;
    }
    .m-transition.fade-out { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <div class="m-viewport" id="mViewport">
    <div class="m-frame" id="mFrame">

      <!-- Background: BGMN.png -->
      <div class="m-bg" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="m-starfield" aria-hidden="true" style="position:absolute;inset:0;width:474px;height:814px;z-index:2;pointer-events:none;display:block;"></canvas>

      <!-- Mist overlay -->
      <div class="m-mist" aria-hidden="true"></div>

      <!-- Logo header (Group 143) -->
      <div class="m-logo-group" role="banner">
        <div class="m-logo-icon" aria-hidden="true"></div>
        <span class="m-logo-text">FUKAIMORI</span>
      </div>

      <!-- DROP POINT heading -->
      <h1 class="m-dp-heading">DROP POINT</h1>

      <!-- SUBMIT YOUR RECOVERED SEQUENCE -->
      <p class="m-dp-sub">SUBMIT YOUR RECOVERED SEQUENCE</p>

      <!-- RECOVERED SEQUENCE label -->
      <p class="m-dp-label">RECOVERED SEQUENCE</p>

      <!-- 6 input boxes (Group 158) -->
      <div class="m-seq-group" id="mSeqGroup" role="group" aria-label="Enter recovered sequence">
        <input class="m-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 1" autocomplete="off" />
        <input class="m-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 2" autocomplete="off" />
        <input class="m-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 3" autocomplete="off" />
        <input class="m-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 4" autocomplete="off" />
        <input class="m-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 5" autocomplete="off" />
        <input class="m-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 6" autocomplete="off" />
      </div>

      <!-- VERIFY button (Group 58) -->
      <button class="m-verify" id="mVerify" type="button">VERIFY</button>

      <!-- NEED ASSISTANCE? -->
      <p class="m-assist-q">NEED ASSISTANCE?</p>

      <!-- ACCESS ARCHIVE NOTES -->
      <a class="m-assist-link" id="mAssistLink" href="keynote.html" aria-label="Access archive notes">ACCESS ARCHIVE NOTES</a>

      <!-- Red dot (Ellipse 14) -->
      <span class="m-dot" id="mDot" aria-hidden="true"></span>

      <!-- Page transition -->
      <div class="m-transition" id="mTransition" aria-hidden="true"></div>

    </div>
  </div>

  <script>
    /* ── Scale frame to fill viewport (cover, no black bars) ── */
    (function () {
      var frame = document.getElementById('mFrame');
      var W = 474, H = 814;
      function scale() {
        var vw = window.innerWidth, vh = window.innerHeight;
        var s = Math.max(vw / W, vh / H);
        frame.style.transform = 'scale(' + s + ')';
      }
      scale();
      window.addEventListener('resize', scale);
    })();

    /* ── Sequence input logic ── */
    (function () {
      var SECRET   = 'KAZUYA';
      var seqGroup = document.getElementById('mSeqGroup');
      var verifyBtn= document.getElementById('mVerify');
      var boxes    = document.querySelectorAll('.m-seq-box');
      var transition = document.getElementById('mTransition');

      if (!verifyBtn || !seqGroup || !boxes.length) return;

      function navigate(href) {
        transition.classList.add('fade-out');
        setTimeout(function () { window.location.href = href; }, 450);
      }

      verifyBtn.addEventListener('click', function () {
        var entered = Array.from(boxes).map(function (b) { return b.value; }).join('').toUpperCase();
        if (entered === SECRET) {
          verifyBtn.disabled = true;
          boxes.forEach(function (b) { b.classList.add('correct'); });
          setTimeout(function () { navigate('granted.html'); }, 700);
        } else {
          boxes.forEach(function (b) { b.classList.add('wrong'); });
          seqGroup.classList.remove('shake');
          void seqGroup.offsetWidth;
          seqGroup.classList.add('shake');
          seqGroup.addEventListener('animationend', function h() {
            seqGroup.removeEventListener('animationend', h);
            seqGroup.classList.remove('shake');
            boxes.forEach(function (b) { b.classList.remove('wrong'); });
          });
        }
      });

      boxes.forEach(function (box, i) {
        box.addEventListener('input', function () {
          box.value = box.value.slice(-1).toUpperCase();
          if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
        });
        box.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
          if (e.key === 'Enter') verifyBtn.click();
        });
      });
    })();

    /* ── Red dot pulse + link hover ── */
    (function () {
      var dot  = document.getElementById('mDot');
      var link = document.getElementById('mAssistLink');
      if (!dot) return;
      setTimeout(function () { dot.classList.add('active'); }, 850);
      if (link) {
        link.addEventListener('mouseenter', function () {
          dot.classList.remove('active'); dot.classList.add('purple');
        });
        link.addEventListener('mouseleave', function () {
          dot.classList.remove('purple'); dot.classList.add('active');
        });
        link.addEventListener('focus', function () {
          dot.classList.remove('active'); dot.classList.add('purple');
        });
        link.addEventListener('blur', function () {
          dot.classList.remove('purple'); dot.classList.add('active');
        });
      }
    })();

    /* ── Feather particles ── */
    (function initFeathers() {
      var cvs = document.querySelector('.m-starfield');
      if (!cvs) return;
      var ctx = cvs.getContext('2d');
      var W = 474, H = 814;
      cvs.width = W; cvs.height = H;
      var feathers = [], NUM = 40;
      var palette = [
        [180,100,255],[210,140,255],[150,70,230],
        [220,160,255],[130,50,210],[255,200,255],[170,90,255]
      ];
      function rnd() {
        var col = palette[Math.floor(Math.random()*palette.length)];
        return { x:Math.random()*W, y:Math.random()*H,
          angle:Math.random()*Math.PI*2, drift:Math.random()*Math.PI*2,
          spin:(Math.random()-0.5)*0.018, speed:Math.random()*0.18+0.04,
          len:Math.random()*18+6, width:Math.random()*1.4+0.4, col:col,
          baseAlpha:Math.random()*0.5+0.3,
          twinklePeriod:Math.random()*160+70, twinklePhase:Math.random()*Math.PI*2 };
      }
      for (var i=0;i<NUM;i++) feathers.push(rnd());
      var frame=0;
      function draw() {
        ctx.clearRect(0,0,W,H); frame++;
        for (var j=0;j<feathers.length;j++) {
          var f=feathers[j];
          f.x+=Math.cos(f.drift)*f.speed; f.y+=Math.sin(f.drift)*f.speed; f.angle+=f.spin;
          if(f.x<-f.len)f.x=W+f.len; if(f.x>W+f.len)f.x=-f.len;
          if(f.y<-f.len)f.y=H+f.len; if(f.y>H+f.len)f.y=-f.len;
          var tw=Math.sin(frame/f.twinklePeriod*Math.PI*2+f.twinklePhase);
          var fa=Math.max(0.06,Math.min(0.92,f.baseAlpha+tw*0.28));
          ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.angle);
          var g=ctx.createLinearGradient(-f.len/2,0,f.len/2,0);
          g.addColorStop(0,'rgba('+f.col+',0)');
          g.addColorStop(0.25,'rgba('+f.col+','+(fa*0.5).toFixed(2)+')');
          g.addColorStop(0.5,'rgba('+f.col+','+fa.toFixed(2)+')');
          g.addColorStop(0.75,'rgba('+f.col+','+(fa*0.5).toFixed(2)+')');
          g.addColorStop(1,'rgba('+f.col+',0)');
          ctx.shadowColor='rgba('+f.col+','+(fa*0.9).toFixed(2)+')';
          ctx.shadowBlur=8; ctx.beginPath();
          ctx.moveTo(-f.len/2,0); ctx.lineTo(f.len/2,0);
          ctx.strokeStyle=g; ctx.lineWidth=f.width*2.2; ctx.stroke();
          ctx.restore();
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
