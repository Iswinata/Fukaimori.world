<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Access Granted." />
  <title>Fukaimori · Access Granted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Maven+Pro:wght@400;500&family=Cantarell:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── GRANTED page — Frame 235 exact Figma spec ── */

    .gr-canvas { background: transparent; }

    /* Background: BGNEW.png fullscreen cover */
    .gr-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background-image: url("BGNEW.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    /* Mystical dim/flicker overlay */
    @keyframes gr-dim-pulse {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.28; }
    }
    @keyframes gr-flicker {
      0%   { opacity: 0; }
      4%   { opacity: 0.07; }
      8%   { opacity: 0; }
      18%  { opacity: 0.11; }
      22%  { opacity: 0; }
      37%  { opacity: 0.05; }
      39%  { opacity: 0; }
      55%  { opacity: 0.09; }
      60%  { opacity: 0.03; }
      65%  { opacity: 0; }
      80%  { opacity: 0.08; }
      85%  { opacity: 0; }
      100% { opacity: 0; }
    }
    .gr-mist {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80,40,160,0.18) 0%, rgba(10,5,30,0.38) 70%, rgba(0,0,0,0.48) 100%);
      animation: gr-dim-pulse 6s ease-in-out infinite, gr-flicker 9s step-end infinite;
    }

    /* ACCESS GRANTED — centered, top 245, 592×80 */
    .gr-heading {
      position: absolute;
      left: calc(50% - 592px / 2 - 0.21px);
      top: 245px;
      width: 592px;
      height: 80px;
      z-index: 9;
      font-family: "Bona Nova", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 66.7996px;
      line-height: 80px;
      text-align: center;
      color: #CFFFB5;
      margin: 0;
      white-space: nowrap;
    }

    /* THE TRUTH ACKNOWLEDGES YOU — centered, top 331.5, 446×32 */
    .gr-sub {
      position: absolute;
      left: calc(50% - 446px / 2 - 0.15px);
      top: 331.5px;
      width: 446px;
      height: 32px;
      z-index: 9;
      font-family: "Bona Nova", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 26.3919px;
      line-height: 32px;
      text-align: center;
      color: #C4FFE2;
      margin: 0;
      white-space: nowrap;
    }

    /* logosuc — centered, top 398, 318×319, difference blend, spin glow */
    @keyframes gr-spin-glow {
      0%   {
        transform: rotate(0deg);
        filter: drop-shadow(0 0  4px rgba(100,255,160,0.5))
                drop-shadow(0 0  9px rgba(100,255,160,0.2));
      }
      40%  {
        transform: rotate(144deg);
        filter: drop-shadow(0 0 14px rgba(80,255,140,0.85))
                drop-shadow(0 0 28px rgba(80,255,140,0.4))
                drop-shadow(0 0 50px rgba(40,200,100,0.2));
      }
      50%  {
        transform: rotate(180deg);
        filter: drop-shadow(0 0  5px rgba(100,255,160,0.4))
                drop-shadow(0 0 14px rgba(100,255,160,0.15));
      }
      85%  {
        transform: rotate(306deg);
        filter: drop-shadow(0 0 16px rgba(60,255,130,0.9))
                drop-shadow(0 0 32px rgba(60,255,130,0.45))
                drop-shadow(0 0 55px rgba(30,180,90,0.22));
      }
      100% {
        transform: rotate(360deg);
        filter: drop-shadow(0 0  4px rgba(100,255,160,0.5))
                drop-shadow(0 0  9px rgba(100,255,160,0.2));
      }
    }
    .gr-logosuc {
      position: absolute;
      left: calc(50% - 318px / 2);
      top: 398px;
      width: 318px;
      height: 319px;
      z-index: 9;
      display: block;
      pointer-events: none;
      transform-origin: center center;
      background: url("logosuc.png") center / contain no-repeat;
      background-blend-mode: difference;
    }
    .gr-logosuc.gr-live {
      animation: gr-spin-glow 10s linear infinite;
    }

    /* YOU MAY CLAIM WHAT IS YOURS. — centered, top 753, 313×23 */
    .gr-reward-q {
      position: absolute;
      left: calc(50% - 313px / 2 + 0.81px);
      top: 753px;
      width: 313px;
      height: 23px;
      z-index: 9;
      font-family: "Bona Nova", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 19.2792px;
      line-height: 23px;
      text-align: center;
      color: #CFFFB5;
      margin: 0;
      white-space: nowrap;
    }

    /* Group 133 — CLAIM REWARD button wrapper: centered, top 789, 258.91×46.23 */
    .gr-claim-btn {
      position: absolute;
      left: calc(50% - 258.91px / 2 + 0px);
      top: 789px;
      width: 258.91px;
      height: 46.23px;
      z-index: 9;
      box-sizing: border-box;
      background: rgba(55, 22, 255, 0.19);
      border: 0.869614px solid #786BC7;
      font-family: "Bona Nova", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: 20.6483px;
      line-height: 25px;
      text-align: center;
      color: #BFB4FF;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, box-shadow 0.3s ease, color 0.3s ease;
    }
    .gr-claim-btn:hover,
    .gr-claim-btn:focus-visible {
      background: rgba(100, 60, 255, 0.35);
      color: #C5BCFF;
      box-shadow: 0 0 20px 4px rgba(155, 65, 255, 0.45);
      outline: none;
    }

    /* Close × — right side, with visible border */
    .gr-close {
      position: absolute;
      left: 1488px;
      top: 215px;
      width: 32px;
      height: 32px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      border: 1px solid rgba(193, 170, 250, 0.55);
      border-radius: 4px;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .gr-close:hover,
    .gr-close:focus-visible {
      transform: scale(1.15);
      border-color: rgba(193, 170, 250, 0.9);
      box-shadow: 0 0 10px rgba(193, 170, 250, 0.45);
      outline: none;
    }
    .gr-close-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: calc(32px * 0.58);
      background: #C1AAFA;
      border-radius: 1px;
      display: block;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .gr-close-line-1 { transform: translate(-50%, -50%) rotate(45deg); }
    .gr-close-line-2 { transform: translate(-50%, -50%) rotate(-45deg); }
    .gr-close:hover .gr-close-line,
    .gr-close:focus-visible .gr-close-line {
      background: #e8deff;
      box-shadow: 0 0 8px rgba(193, 170, 250, 0.9);
    }

    /* ── Entrance animations ── */
    @keyframes gr-enter {
      0%   { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    @keyframes gr-enter-logo {
      0%   { opacity: 0; filter: blur(6px); }
      100% { opacity: 1; filter: blur(0); }
    }
    .gr-canvas .gr-heading  { animation: gr-enter 0.9s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
    .gr-canvas .gr-sub      { animation: gr-enter 0.75s cubic-bezier(0.22,1,0.36,1) 0.25s both; }
    .gr-canvas .gr-reward-q { animation: gr-enter 0.65s cubic-bezier(0.22,1,0.36,1) 0.55s both; }
    .gr-canvas .gr-claim-btn{ animation: gr-enter 0.6s  cubic-bezier(0.22,1,0.36,1) 0.65s both; }
    .gr-canvas .gr-close    { animation: gr-enter 0.5s  cubic-bezier(0.22,1,0.36,1) 0.1s  both; }
    /* Logo entrance — no translateY so spin doesn't conflict */
    .gr-canvas .gr-logosuc:not(.gr-live) {
      animation: gr-enter-logo 0.8s cubic-bezier(0.22,1,0.36,1) 0.35s both;
    }
    /* Once gr-live is added, spin-glow takes full control */
    .gr-canvas .gr-logosuc.gr-live {
      animation: gr-spin-glow 10s linear infinite !important;
    }

    /* ── Hide desktop / show mobile ── */
    @media (max-width: 768px) {
      .viewport { display: none !important; }
      .m-viewport { display: flex !important; }
    }
    @media (min-width: 769px) {
      .m-viewport { display: none !important; }
    }

    /* ══ MOBILE LAYOUT (Frame 263) ══ */
    .m-viewport {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }
    .m-frame {
      position: relative;
      width: 474px; height: 814px;
      background: #fff;
      overflow: hidden;
      flex-shrink: 0;
      transform-origin: center center;
    }
    .m-bg {
      position: absolute;
      width: 474px; height: 814px;
      left: calc(50% - 474px/2);
      top: calc(50% - 814px/2);
      background: url('BGMN.png') center/cover no-repeat;
      pointer-events: none; z-index: 0;
    }
    .m-mist {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(40,120,80,0.12) 0%, rgba(10,5,30,0.35) 70%, rgba(0,0,0,0.5) 100%);
      animation: m-dim 6s ease-in-out infinite;
    }
    @keyframes m-dim { 0%,100%{opacity:.18} 50%{opacity:.28} }
    .m-logo-group {
      position: absolute;
      width: 146.41px; height: 21px;
      left: calc(50% - 146.41px/2 + 0.21px); top: 34px; z-index: 5;
    }
    .m-logo-icon {
      position: absolute;
      width: 16.16px; height: 18.13px; left: 0; top: 2.13px;
      background: url('Subtract.png') center/contain no-repeat;
    }
    .m-logo-text {
      position: absolute;
      width: 122px; height: 21px; left: 24.41px; top: 0;
      font-family: 'Cantarell', sans-serif;
      font-weight: 700; font-size: 14.8308px; line-height: 21px;
      letter-spacing: 0.21em;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; white-space: nowrap;
    }
    .m-heading {
      position: absolute;
      width: 304px; height: 41px;
      left: calc(50% - 304px/2); top: 235px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400; font-size: 34.2939px; line-height: 41px;
      text-align: center; color: #CFFFB5; z-index: 5; white-space: nowrap;
    }
    .m-sub {
      position: absolute;
      width: 273px; height: 19px;
      left: calc(50% - 273px/2 + 0.41px); top: 280.45px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400; font-size: 16.1463px; line-height: 19px;
      text-align: center; color: #C4FFE2; z-index: 5; white-space: nowrap;
    }
    .m-logo-success {
      position: absolute;
      width: 161.97px; height: 162.49px;
      left: calc(50% - 161.97px/2 + 0.57px); top: 320.22px;
      background: url('logosuc.png') center/contain no-repeat;
      mix-blend-mode: difference; z-index: 5;
    }
    @keyframes m-spin-glow {
      0%   { transform: rotate(0deg);   filter: drop-shadow(0 0  4px rgba(100,255,160,0.5)) drop-shadow(0 0  9px rgba(100,255,160,0.2)); }
      40%  { transform: rotate(144deg); filter: drop-shadow(0 0 14px rgba(80,255,140,0.85)) drop-shadow(0 0 28px rgba(80,255,140,0.4)) drop-shadow(0 0 50px rgba(40,200,100,0.2)); }
      50%  { transform: rotate(180deg); filter: drop-shadow(0 0  5px rgba(100,255,160,0.4)) drop-shadow(0 0 14px rgba(100,255,160,0.15)); }
      85%  { transform: rotate(306deg); filter: drop-shadow(0 0 16px rgba(60,255,130,0.9))  drop-shadow(0 0 32px rgba(60,255,130,0.45)) drop-shadow(0 0 55px rgba(30,180,90,0.22)); }
      100% { transform: rotate(360deg); filter: drop-shadow(0 0  4px rgba(100,255,160,0.5)) drop-shadow(0 0  9px rgba(100,255,160,0.2)); }
    }
    .m-logo-success {
      transform-origin: center center;
      animation: m-spin-glow 10s linear infinite;
    }
    .m-claim-text {
      position: absolute;
      width: 289px; height: 21px;
      left: calc(50% - 289px/2 + 0.46px); top: 503.17px;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400; font-size: 17.7777px; line-height: 21px;
      text-align: center; color: #CFFFB5; z-index: 5; white-space: nowrap;
    }
    .m-claim-btn {
      position: absolute;
      width: 194px; height: 39.35px;
      left: calc(50% - 194px/2); top: 531.83px;
      background: rgba(55,22,255,.19); border: 0.733803px solid #786BC7;
      font-family: 'Bona Nova', Georgia, serif;
      font-weight: 400; font-size: 14.5661px; line-height: 17px;
      text-align: center; color: #BFB4FF; cursor: pointer; z-index: 6;
      text-decoration: none; display: flex; align-items: center; justify-content: center;
      transition: background .25s ease, box-shadow .25s ease;
    }
    .m-claim-btn:hover,.m-claim-btn:focus-visible{background:rgba(55,22,255,.32);box-shadow:0 0 14px rgba(105,78,171,.5);outline:none}
    @keyframes m-enter{from{opacity:0;transform:translateY(14px);filter:blur(4px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
    .m-logo-group{animation:m-enter .7s cubic-bezier(.22,1,.36,1) .1s both}
    .m-heading{animation:m-enter .8s cubic-bezier(.22,1,.36,1) .2s both}
    .m-sub{animation:m-enter .8s cubic-bezier(.22,1,.36,1) .32s both}
    .m-claim-text{animation:m-enter .7s cubic-bezier(.22,1,.36,1) .56s both}
    .m-claim-btn{animation:m-enter .7s cubic-bezier(.22,1,.36,1) .68s both}
    .m-transition{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:99;transition:opacity .45s ease}
    .m-transition.fade-out{opacity:1;pointer-events:auto}
  </style>
</head>
<body>
  <div class="viewport">
    <div class="canvas gr-canvas" id="canvas">

      <!-- Background: BGNEW.png -->
      <div class="gr-bg" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>

      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- ACCESS GRANTED -->
      <h1 class="gr-heading">ACCESS GRANTED</h1>

      <!-- THE TRUTH ACKNOWLEDGES YOU -->
      <p class="gr-sub">THE TRUTH ACKNOWLEDGES YOU</p>

      <!-- logosuc — centered, top 398, 318×319, difference blend -->
      <div class="gr-logosuc" aria-hidden="true"></div>

      <!-- YOU MAY CLAIM WHAT IS YOURS. -->
      <p class="gr-reward-q">YOU MAY CLAIM WHAT IS YOURS.</p>

      <!-- CLAIM REWARD button -->
      <button class="gr-claim-btn" type="button" onclick="window.location.href='claim.html'">CLAIM REWARD</button>

      <!-- Close × — with border -->
      <a class="gr-close" href="index.html" data-transition aria-label="Close — return to entrance">
        <span class="gr-close-line gr-close-line-1" aria-hidden="true"></span>
        <span class="gr-close-line gr-close-line-2" aria-hidden="true"></span>
      </a>

    </div>
  </div>

  <!-- ══ MOBILE LAYOUT HTML (Frame 263) ══ -->
  <div class="m-viewport" id="mViewport">
    <div class="m-frame" id="mFrame">
      <div class="m-bg" aria-hidden="true"></div>
      <canvas class="m-starfield" aria-hidden="true" style="position:absolute;inset:0;width:474px;height:814px;z-index:2;pointer-events:none;display:block;"></canvas>
      <div class="m-mist" aria-hidden="true"></div>
      <div class="m-logo-group" role="banner">
        <div class="m-logo-icon" aria-hidden="true"></div>
        <span class="m-logo-text">FUKAIMORI</span>
      </div>
      <h1 class="m-heading">ACCESS GRANTED</h1>
      <p class="m-sub">THE TRUTH ACKNOWLEDGES YOU</p>
      <div class="m-logo-success" aria-hidden="true"></div>
      <p class="m-claim-text">YOU MAY CLAIM WHAT IS YOURS.</p>
      <a class="m-claim-btn" href="claim.html" id="mClaimBtn" aria-label="Claim your reward">CLAIM REWARD</a>
      <div class="m-transition" id="mTransition" aria-hidden="true"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Desktop: start spin + glow
    var logosuc = document.querySelector('.gr-logosuc');
    if (logosuc) { logosuc.classList.add('gr-live'); }

    // Mobile: scale frame to fill viewport
    (function () {
      var frame = document.getElementById('mFrame');
      if (!frame) return;
      var W = 474, H = 814;
      function scale() {
        var vw = window.innerWidth, vh = window.innerHeight;
        var s = Math.max(vw / W, vh / H);
        frame.style.transform = 'scale(' + s + ')';
      }
      scale();
      window.addEventListener('resize', scale);
    })();

    // Mobile: claim button fade transition
    (function () {
      var btn   = document.getElementById('mClaimBtn');
      var trans = document.getElementById('mTransition');
      if (!btn || !trans) return;
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        var href = btn.getAttribute('href');
        trans.classList.add('fade-out');
        setTimeout(function () { window.location.href = href; }, 450);
      });
    })();
  </script>
</body>
</html>
