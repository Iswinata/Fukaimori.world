<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Moon Calibration</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
}
.bg {
  position: fixed;
  inset: 0;
  background-image: url("BGM.png");
  background-size: cover;
  background-position: center 70%;
  background-repeat: no-repeat;
}
.moon {
  position: absolute;
  left: calc(50% - 80px / 2 - 0.5px);
  top: calc(327 / 812 * 100%);
  width: 80px;
  height: 82px;
  background-image: url("BGLPM.png");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  border-radius: 50%;
  border: 2px solid rgba(255, 100, 100, 0.6);
  z-index: 10;
}
.crosshair {
  position: absolute;
  left: calc(50% - 80px / 2 - 0.5px);
  top: calc(327 / 812 * 100%);
  width: 80px;
  height: 82px;
  z-index: 11;
  pointer-events: none;
}
.crosshair::before, .crosshair::after {
  content: "";
  position: absolute;
  background: rgba(255,50,50,0.7);
}
.crosshair::before {
  left: 50%; top: 0; width: 1px; height: 100%;
  transform: translateX(-50%);
}
.crosshair::after {
  top: 50%; left: 0; height: 1px; width: 100%;
  transform: translateY(-50%);
}
.info {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 16px;
  border-radius: 8px;
  font-family: monospace;
  font-size: 13px;
  z-index: 20;
  text-align: center;
  min-width: 240px;
}
.btn-row {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 20;
}
button {
  background: rgba(100,60,255,0.7);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="moon" id="moon"></div>
<div class="crosshair" id="crosshair"></div>

<div class="btn-row">
  <button onclick="move('up')">▲</button>
  <button onclick="move('down')">▼</button>
  <button onclick="move('left')">◀</button>
  <button onclick="move('right')">▶</button>
  <button onclick="changeSize(4)">+Size</button>
  <button onclick="changeSize(-4)">-Size</button>
</div>

<div class="info" id="info">top: 327px | left: center-0.5px | 80×82px</div>

<script>
const moon = document.getElementById('moon');
const crosshair = document.getElementById('crosshair');
const info = document.getElementById('info');

let topPx = 327;
let leftOffset = -0.5; // offset dari center
let w = 80;
let h = 82;
const vh = window.innerHeight;

function update() {
  const topPct = (topPx / 812 * 100).toFixed(2);
  const leftCalc = `calc(50% - ${w/2}px + ${leftOffset}px)`;
  moon.style.left = leftCalc;
  moon.style.top = topPct + '%';
  moon.style.width = w + 'px';
  moon.style.height = h + 'px';
  crosshair.style.left = leftCalc;
  crosshair.style.top = topPct + '%';
  crosshair.style.width = w + 'px';
  crosshair.style.height = h + 'px';
  info.textContent = `top: ${topPx}px (${topPct}%) | offset: ${leftOffset}px | ${w}×${h}px`;
}

function move(dir) {
  if (dir === 'up') topPx -= 2;
  if (dir === 'down') topPx += 2;
  if (dir === 'left') leftOffset -= 2;
  if (dir === 'right') leftOffset += 2;
  update();
}

function changeSize(delta) {
  w += delta;
  h += Math.round(delta * 82/80);
  update();
}

update();
</script>
</body>
</html>
