<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Claim Your Reward." />
  <title>Fukaimori · Claim Your Reward</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Cantarell:wght@700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* DESKTOP/MOBILE SWITCH */
    .viewport     { display: flex; }
    .mob-viewport { display: none; }
    @media (max-width: 768px) {
      .viewport     { display: none; }
      .mob-viewport { display: flex; }
    }
    /* ══════════════════════════════
       DESKTOP STYLES
    ══════════════════════════════ */
    .cl-canvas { background: transparent; }

    .cl-bg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      background-image: url("BGNEW.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    @keyframes cl-dim-pulse { 0%,100%{opacity:.15} 50%{opacity:.28} }
    @keyframes cl-flicker {
      0%{opacity:0} 4%{opacity:.07} 8%{opacity:0} 18%{opacity:.11} 22%{opacity:0}
      37%{opacity:.05} 39%{opacity:0} 55%{opacity:.09} 60%{opacity:.03} 65%{opacity:0}
      80%{opacity:.08} 85%{opacity:0} 100%{opacity:0}
    }
    .cl-mist {
      position: fixed; inset: 0; z-index: 8; pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80,40,160,.18) 0%, rgba(10,5,30,.38) 70%, rgba(0,0,0,.48) 100%);
      animation: cl-dim-pulse 6s ease-in-out infinite, cl-flicker 9s step-end infinite;
    }

    .cl-heading {
      position: absolute;
      left: calc(50% - 728px/2); top: 205px;
      width: 728px; height: 80px; z-index: 9;
      font-family: "Bona Nova", Georgia, serif; font-weight: 400;
      font-size: 66.7996px; line-height: 80px; text-align: center;
      color: #CFFFB5; margin: 0; white-space: nowrap;
    }
    .cl-sub {
      position: absolute;
      left: calc(50% - 469px/2 + 0.56px); top: 291.5px;
      width: 469px; height: 32px; z-index: 9;
      font-family: "Bona Nova", Georgia, serif; font-weight: 400;
      font-size: 26.3919px; line-height: 32px; text-align: center;
      color: #C4FFE2; margin: 0; white-space: nowrap;
    }
    .cl-label {
      position: absolute; z-index: 9;
      font-family: "Bona Nova", Georgia, serif; font-weight: 400;
      font-size: 21.0057px; line-height: 25px; color: #CFFFB5;
      margin: 0; pointer-events: none;
    }
    .cl-label-name  { left: 700px; top: 352px; }
    .cl-label-email { left: 700px; top: 459.05px; }
    .cl-label-addr  { left: 700px; top: 566.09px; }
    .cl-label-phone { left: 700px; top: 673.14px; }

    .cl-input {
      position: absolute; z-index: 9; box-sizing: border-box;
      width: 767.85px; height: 63px;
      left: calc(50% - 767.85px/2 + 0.08px);
      background: rgba(196,255,226,.08);
      border: 1.24728px solid #786BC7;
      font-family: "Bona Nova", Georgia, serif; font-weight: 400;
      font-size: 19px; color: #E8DEFF; padding: 0 18px; outline: none;
      transition: border-color .25s ease, box-shadow .25s ease;
    }
    .cl-input:focus { border-color: #A99AFF; box-shadow: 0 0 12px rgba(155,100,255,.35); }
    .cl-input::placeholder { color: rgba(196,255,226,.25); }
    .cl-input-name  { top: 383.96px; }
    .cl-input-email { top: 490.96px; }
    .cl-input-addr  { top: 597.96px; }
    .cl-input-phone { top: 704.96px; }

    .cl-checkbox {
      position: absolute; left: 849.21px; top: 791px;
      width: 24px; height: 24px; z-index: 9; box-sizing: border-box;
      border: 0.923913px solid #786BC7; background: transparent;
      appearance: none; -webkit-appearance: none; cursor: pointer;
      transition: background .2s ease, border-color .2s ease;
    }
    .cl-checkbox:checked { background: rgba(120,107,199,.35); border-color: #A99AFF; }
    .cl-checkbox:checked::after {
      content: ""; position: absolute; left: 5px; top: 2px;
      width: 7px; height: 12px;
      border: 2px solid #C1AAFA; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .cl-checkbox:focus-visible { outline: none; box-shadow: 0 0 6px rgba(155,100,255,.6); }

    .cl-agree-label {
      position: absolute;
      left: calc(50% - 434px/2 + 18.21px); top: 795px;
      width: 434px; height: 17px; z-index: 9;
      font-family: "Bona Nova", Georgia, serif; font-weight: 400;
      font-size: 14.4356px; line-height: 17px;
      color: rgba(255,213,142,.43); cursor: pointer;
      user-select: none; white-space: nowrap; margin: 0;
    }

    .cl-submit-btn {
      position: absolute;
      left: calc(50% - 258.91px/2); top: 829px;
      width: 258.91px; height: 46.23px; z-index: 9; box-sizing: border-box;
      background: rgba(55,22,255,.19); border: 0.869614px solid #786BC7;
      font-family: "Bona Nova", Georgia, serif; font-weight: 400;
      font-size: 20.5487px; line-height: 25px; text-align: center;
      color: #BFB4FF; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .3s ease, box-shadow .3s ease, color .3s ease;
    }
    .cl-submit-btn:hover, .cl-submit-btn:focus-visible {
      background: rgba(100,60,255,.35); color: #C5BCFF;
      box-shadow: 0 0 20px 4px rgba(155,65,255,.45); outline: none;
    }
    .cl-submit-btn:disabled { opacity: .45; cursor: not-allowed; }

    .cl-close {
      position: absolute; left: 1488px; top: 160px;
      width: 32px; height: 32px; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
      box-sizing: border-box; border: 1px solid rgba(193,170,250,.55); border-radius: 4px;
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    }
    .cl-close:hover, .cl-close:focus-visible {
      transform: scale(1.15); border-color: rgba(193,170,250,.9);
      box-shadow: 0 0 10px rgba(193,170,250,.45); outline: none;
    }
    .cl-close-line {
      position: absolute; left: 50%; top: 50%;
      width: 2px; height: calc(32px * .58);
      background: #C1AAFA; border-radius: 1px; display: block;
      transition: background .3s ease, box-shadow .3s ease;
    }
    .cl-close-line-1 { transform: translate(-50%,-50%) rotate(45deg); }
    .cl-close-line-2 { transform: translate(-50%,-50%) rotate(-45deg); }
    .cl-close:hover .cl-close-line, .cl-close:focus-visible .cl-close-line {
      background: #e8deff; box-shadow: 0 0 8px rgba(193,170,250,.9);
    }

    @keyframes cl-enter {
      0%   { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .cl-canvas .cl-heading    { animation: cl-enter .9s  cubic-bezier(.22,1,.36,1) .1s  both; }
    .cl-canvas .cl-sub        { animation: cl-enter .75s cubic-bezier(.22,1,.36,1) .2s  both; }
    .cl-canvas .cl-label      { animation: cl-enter .65s cubic-bezier(.22,1,.36,1) .3s  both; }
    .cl-canvas .cl-input      { animation: cl-enter .6s  cubic-bezier(.22,1,.36,1) .35s both; }
    .cl-canvas .cl-checkbox   { animation: cl-enter .55s cubic-bezier(.22,1,.36,1) .5s  both; }
    .cl-canvas .cl-agree-label{ animation: cl-enter .55s cubic-bezier(.22,1,.36,1) .5s  both; }
    .cl-canvas .cl-submit-btn { animation: cl-enter .55s cubic-bezier(.22,1,.36,1) .58s both; }
    .cl-canvas .cl-close      { animation: cl-enter .5s  cubic-bezier(.22,1,.36,1) .1s  both; }
    /* ══════════════════════════════
       MOBILE STYLES (≤ 768px)
    ══════════════════════════════ */
    .mob-viewport {
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      overflow: hidden; background: #000;
    }
    .m-frame {
      position: relative; width: 474px; height: 814px;
      background: #fff; overflow: hidden;
      flex-shrink: 0; transform-origin: center center;
    }
    .m-bg {
      position: absolute; width: 474px; height: 814px;
      left: calc(50% - 474px/2); top: calc(50% - 814px/2);
      background: url('BGMN.png') center/cover no-repeat;
      pointer-events: none; z-index: 0;
    }
    .m-logo-group {
      position: absolute; width: 146.41px; height: 21px;
      left: calc(50% - 146.41px/2 + 0.21px); top: 34px; z-index: 5;
    }
    .m-logo-icon {
      position: absolute; width: 16.16px; height: 18.13px;
      left: 0; top: 2.13px;
      background: url('Subtract.png') center/contain no-repeat;
    }
    .m-logo-text {
      position: absolute; width: 122px; height: 21px;
      left: 24.41px; top: 0;
      font-family: 'Cantarell', sans-serif; font-weight: 700;
      font-size: 14.8308px; line-height: 21px; letter-spacing: 0.21em;
      background: linear-gradient(90deg, #786BC7 0%, #442ADD 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; white-space: nowrap;
    }
    .m-heading {
      position: absolute; width: 357px; height: 39px;
      left: calc(50% - 357px/2 - 0.13px); top: 236px;
      font-family: 'Bona Nova', Georgia, serif; font-weight: 400;
      font-size: 32.7805px; line-height: 39px; text-align: center;
      color: #CFFFB5; z-index: 5; white-space: nowrap;
    }
    .m-sub {
      position: absolute; width: 230px; height: 16px;
      left: calc(50% - 230px/2 + 0.19px); top: 278.45px;
      font-family: 'Bona Nova', Georgia, serif; font-weight: 400;
      font-size: 12.9513px; line-height: 16px; text-align: center;
      color: #C4FFE2; z-index: 5; white-space: nowrap;
    }
    .m-label {
      position: absolute; z-index: 5;
      font-family: 'Bona Nova', Georgia, serif; font-weight: 400;
      font-size: 10.3081px; line-height: 12px; color: #CFFFB5;
      pointer-events: none;
    }
    .m-label-name  { left: 48.55px; top: 308.14px; }
    .m-label-email { left: 48.55px; top: 360.67px; }
    .m-label-addr  { left: 48.55px; top: 413.2px; }
    .m-label-phone { left: 48.55px; top: 465.73px; }
    .m-input {
      position: absolute; z-index: 5; box-sizing: border-box;
      width: 376.81px; height: 30.92px;
      left: calc(50% - 376.81px/2 + 0.03px);
      background: rgba(196,255,226,.08);
      border: 0.612077px solid #786BC7;
      font-family: 'Bona Nova', Georgia, serif; font-weight: 400;
      font-size: 11px; color: #E8DEFF; padding: 0 10px; outline: none;
      transition: border-color .25s ease, box-shadow .25s ease;
    }
    .m-input:focus { border-color: #A99AFF; box-shadow: 0 0 8px rgba(155,100,255,.35); }
    .m-input::placeholder { color: rgba(196,255,226,.22); }
    .m-input-name  { top: 323.82px; }
    .m-input-email { top: 376.33px; }
    .m-input-addr  { top: 428.84px; }
    .m-input-phone { top: 481.34px; }
    .m-agree-row {
      position: absolute; z-index: 5;
      left: 0; width: 474px; top: 519px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .m-checkbox {
      flex-shrink: 0;
      width: 15px; height: 15px; box-sizing: border-box;
      border: 0.7px solid #FFFFFF; background: transparent;
      appearance: none; -webkit-appearance: none; cursor: pointer;
      transition: background .2s ease, border-color .2s ease;
      position: relative;
    }
    .m-checkbox:checked { background: rgba(120,107,199,.35); border-color: #A99AFF; }
    .m-checkbox:checked::after {
      content: ""; position: absolute; left: 2px; top: 0;
      width: 4px; height: 7px;
      border: 1.5px solid #C1AAFA; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .m-checkbox:focus-visible { outline: none; box-shadow: 0 0 4px rgba(155,100,255,.6); }
    .m-agree-label {
      font-family: 'Bona Nova', Georgia, serif; font-weight: 400;
      font-size: 10px; line-height: 12px;
      color: #FFD58E; cursor: pointer; user-select: none; white-space: nowrap;
    }
    .m-submit-btn {
      position: absolute; width: 181.94px; height: 32.49px;
      left: 146.45px; top: 545.12px; z-index: 6; box-sizing: border-box;
      background: rgba(55,22,255,.19); border: 0.611092px solid #786BC7;
      font-family: 'Bona Nova', Georgia, serif; font-weight: 400;
      font-size: 14.5099px; line-height: 17px; text-align: center;
      color: #BFB4FF; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .25s ease, box-shadow .25s ease;
    }
    .m-submit-btn:hover, .m-submit-btn:focus-visible {
      background: rgba(100,60,255,.35);
      box-shadow: 0 0 14px rgba(105,78,171,.5); outline: none;
    }
    .m-submit-btn:disabled { opacity: .45; cursor: not-allowed; }
    .m-mist {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(40,120,80,.10) 0%, rgba(10,5,30,.32) 70%, rgba(0,0,0,.46) 100%);
      animation: m-dim 6s ease-in-out infinite;
    }
    @keyframes m-dim { 0%,100%{opacity:.18} 50%{opacity:.28} }
    @keyframes m-enter {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .m-logo-group, .m-heading, .m-sub, .m-label, .m-input,
    .m-checkbox, .m-agree-label, .m-submit-btn {
      animation: m-enter .8s cubic-bezier(.22,1,.36,1) .15s both;
    }
    .m-heading     { animation-delay: .18s; }
    .m-sub         { animation-delay: .26s; }
    .m-label       { animation-delay: .32s; }
    .m-input       { animation-delay: .36s; }
    .m-checkbox    { animation-delay: .50s; }
    .m-agree-label { animation-delay: .50s; }
    .m-submit-btn  { animation-delay: .58s; }
    .m-transition {
      position: absolute; inset: 0; background: #000;
      opacity: 0; pointer-events: none; z-index: 99;
      transition: opacity .45s ease;
    }
    .m-transition.fade-out { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <!-- DESKTOP -->
  <div class="viewport">
    <div class="canvas cl-canvas" id="canvas">
      <!-- Background: BGNEW.png -->
      <div class="cl-bg" aria-hidden="true"></div>
      <!-- Mist overlay -->
      <div class="cl-mist" aria-hidden="true"></div>
      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>
      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>
      <!-- CLAIM YOUR REWARD -->
      <h1 class="cl-heading">CLAIM YOUR REWARD</h1>
      <!-- RECOVERED BY YOU. CLAIM BY YOU. -->
      <p class="cl-sub">RECOVERED BY YOU. CLAIM BY YOU.</p>
      <!-- FULL NAME -->
      <label class="cl-label cl-label-name" for="cl-name">FULL NAME</label>
      <input class="cl-input cl-input-name" id="cl-name" type="text" name="fullname" autocomplete="name" required />
      <!-- EMAIL ADDRESS -->
      <label class="cl-label cl-label-email" for="cl-email">EMAIL ADDRESS</label>
      <input class="cl-input cl-input-email" id="cl-email" type="email" name="email" autocomplete="email" required />
      <!-- SHIPPING ADDRESS -->
      <label class="cl-label cl-label-addr" for="cl-addr">SHIPPING ADDRESS</label>
      <input class="cl-input cl-input-addr" id="cl-addr" type="text" name="address" autocomplete="street-address" required />
      <!-- PHONE NUMBER -->
      <label class="cl-label cl-label-phone" for="cl-phone">PHONE NUMBER</label>
      <input class="cl-input cl-input-phone" id="cl-phone" type="tel" name="phone" autocomplete="tel" required />
      <!-- Checkbox -->
      <input class="cl-checkbox" type="checkbox" id="cl-agree" name="agree" required />
      <label class="cl-agree-label" for="cl-agree">I AGREE TO THE TERMS OF FUKAIMORI ARCHIVE PROTOCOL.</label>
      <!-- SUBMIT CLAIM -->
      <button class="cl-submit-btn" type="button" id="cl-submit" disabled>SUBMIT CLAIM</button>
      <!-- Close × -->
      <a class="cl-close" href="index.html" data-transition aria-label="Close — return to entrance">
        <span class="cl-close-line cl-close-line-1" aria-hidden="true"></span>
        <span class="cl-close-line cl-close-line-2" aria-hidden="true"></span>
      </a>
    </div>
  </div>

  <!-- MOBILE -->
  <div class="mob-viewport" id="mViewport">
    <div class="m-frame" id="mFrame">
      <!-- Background -->
      <div class="m-bg" aria-hidden="true"></div>
      <!-- Feather particles -->
      <canvas class="m-starfield" aria-hidden="true" style="position:absolute;inset:0;width:474px;height:814px;z-index:2;pointer-events:none;display:block;"></canvas>
      <!-- Mist -->
      <div class="m-mist" aria-hidden="true"></div>
      <!-- Logo header -->
      <div class="m-logo-group" role="banner">
        <div class="m-logo-icon" aria-hidden="true"></div>
        <span class="m-logo-text">FUKAIMORI</span>
      </div>
      <!-- CLAIM YOUR REWARD -->
      <h1 class="m-heading">CLAIM YOUR REWARD</h1>
      <!-- RECOVERED BY YOU. CLAIM BY YOU. -->
      <p class="m-sub">RECOVERED BY YOU. CLAIM BY YOU.</p>
      <!-- FULL NAME -->
      <label class="m-label m-label-name" for="m-name">FULL NAME</label>
      <input class="m-input m-input-name" id="m-name" type="text" name="fullname" autocomplete="name" required />
      <!-- EMAIL ADDRESS -->
      <label class="m-label m-label-email" for="m-email">EMAIL ADDRESS</label>
      <input class="m-input m-input-email" id="m-email" type="email" name="email" autocomplete="email" required />
      <!-- SHIPPING ADDRESS -->
      <label class="m-label m-label-addr" for="m-addr">SHIPPING ADDRESS</label>
      <input class="m-input m-input-addr" id="m-addr" type="text" name="address" autocomplete="street-address" required />
      <!-- PHONE NUMBER -->
      <label class="m-label m-label-phone" for="m-phone">PHONE NUMBER</label>
      <input class="m-input m-input-phone" id="m-phone" type="tel" name="phone" autocomplete="tel" required />
      <!-- Checkbox + agree label -->
      <div class="m-agree-row">
        <input class="m-checkbox" type="checkbox" id="m-agree" name="agree" required />
        <label class="m-agree-label" for="m-agree">I AGREE TO THE TERMS OF FUKAIMORI ARCHIVE PROTOCOL.</label>
      </div>
      <!-- SUBMIT CLAIM button -->
      <button class="m-submit-btn" type="button" id="mSubmitBtn" disabled>SUBMIT CLAIM</button>
      <!-- Page transition overlay -->
      <div class="m-transition" id="mTransition" aria-hidden="true"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    /* ── Desktop: enable submit when checkbox checked ── */
    (function () {
      var agree  = document.getElementById('cl-agree');
      var submit = document.getElementById('cl-submit');
      if (!agree || !submit) return;
      agree.addEventListener('change', function () {
        submit.disabled = !agree.checked;
      });
      submit.addEventListener('click', function () {
        if (submit.disabled) return;
        var overlay = document.querySelector('.page-transition');
        if (overlay) {
          overlay.classList.remove('is-entering');
          overlay.classList.add('is-leaving');
          overlay.addEventListener('animationend', function onLeft() {
            overlay.removeEventListener('animationend', onLeft);
            window.location.href = 'submitted.html';
          });
        } else {
          window.location.href = 'submitted.html';
        }
      });
    })();

    /* ── Mobile: scale frame + enable submit ── */
    (function () {
      var frame = document.getElementById('mFrame');
      if (frame) {
        var W = 474, H = 814;
        function scale() {
          var vw = window.innerWidth, vh = window.innerHeight;
          var s = Math.max(vw / W, vh / H);
          frame.style.transform = 'scale(' + s + ')';
        }
        scale();
        window.addEventListener('resize', scale);
      }

      var mAgree  = document.getElementById('m-agree');
      var mSubmit = document.getElementById('mSubmitBtn');
      var mTrans  = document.getElementById('mTransition');
      if (!mAgree || !mSubmit) return;
      mAgree.addEventListener('change', function () {
        mSubmit.disabled = !mAgree.checked;
      });
      mSubmit.addEventListener('click', function () {
        if (mSubmit.disabled) return;
        if (mTrans) mTrans.classList.add('fade-out');
        setTimeout(function () { window.location.href = 'submitted.html'; }, 450);
      });
    })();
  </script>
</body>
</html>
