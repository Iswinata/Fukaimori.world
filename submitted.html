<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Claim Received." />
  <title>Fukaimori · Claim Received</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── SUBMITTED page — Frame 237 exact Figma spec ── */

    .sb-canvas { background: transparent; }

    /* Background: BGNEW.png, no overlay */
    .sb-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background-image: url("BGNEW.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    /* Rectangle 12: visibility hidden */
    .sb-overlay { display: none; }

    /* CLAIM RECEIVED — centered, top 241, 573×80 */
    .sb-heading {
      position: absolute;
      left: calc(50% - 573px / 2 + 0.5px);
      top: 241px;
      width: 573px;
      height: 80px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 66.7996px;
      line-height: 80px;
      text-align: center;
      color: #A99AFF;
      margin: 0;
      white-space: nowrap;
    }

    /* YOUR REWARD IS ON IT'S WAY — centered, top 327.5, 392×32 */
    .sb-sub {
      position: absolute;
      left: calc(50% - 392px / 2 + 0.06px);
      top: 327.5px;
      width: 392px;
      height: 32px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 26.3919px;
      line-height: 32px;
      text-align: center;
      color: #CFB7FF;
      margin: 0;
      white-space: nowrap;
    }

    /* Icon — centered, top 393, 317×323, img tag for drop-shadow */
    @keyframes sb-spin-glow {
      0%   {
        transform: rotate(0deg);
        filter: drop-shadow(0 0  4px rgba(155, 80, 255, 0.4))
                drop-shadow(0 0  9px rgba(155, 80, 255, 0.15));
      }
      40%  {
        transform: rotate(144deg);
        filter: drop-shadow(0 0 12px rgba(175, 60, 255, 0.7))
                drop-shadow(0 0 24px rgba(175, 60, 255, 0.3))
                drop-shadow(0 0 40px rgba(120, 30, 255, 0.15));
      }
      50%  {
        transform: rotate(180deg);
        filter: drop-shadow(0 0  5px rgba(155, 80, 255, 0.35))
                drop-shadow(0 0 12px rgba(155, 80, 255, 0.12));
      }
      85%  {
        transform: rotate(306deg);
        filter: drop-shadow(0 0 14px rgba(185, 55, 255, 0.75))
                drop-shadow(0 0 28px rgba(185, 55, 255, 0.35))
                drop-shadow(0 0 45px rgba(120, 30, 255, 0.18));
      }
      100% {
        transform: rotate(360deg);
        filter: drop-shadow(0 0  4px rgba(155, 80, 255, 0.4))
                drop-shadow(0 0  9px rgba(155, 80, 255, 0.15));
      }
    }
    @keyframes sb-enter-logo {
      0%   { opacity: 0; filter: blur(6px); }
      100% { opacity: 1; filter: blur(0); }
    }
    .sb-icon {
      position: absolute;
      left: calc(50% - 317px / 2 - 0.5px);
      top: 393px;
      width: 317px;
      height: 323px;
      z-index: 6;
      display: block;
      object-fit: contain;
      pointer-events: none;
      transform-origin: center center;
    }
    .sb-canvas .sb-icon:not(.sb-live) {
      animation: sb-enter-logo 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }
    .sb-canvas .sb-icon.sb-live {
      animation: sb-spin-glow 10s linear infinite !important;
    }

    /* Confirmation text — centered, top 743, 443×78 */
    .sb-confirm {
      position: absolute;
      left: calc(50% - 443px / 2 - 0.5px);
      top: 743px;
      width: 443px;
      height: 78px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 22.0642px;
      line-height: 26px;
      text-align: center;
      color: #E1D39D;
      margin: 0;
    }

    /* BACK TO HOME button — centered, top 853, 373.16×49.41 */
    .sb-home-btn {
      position: absolute;
      left: calc(50% - 373.16px / 2 - 0.42px);
      top: 853px;
      width: 373.16px;
      height: 49.41px;
      z-index: 7;
      box-sizing: border-box;
      background: rgba(0, 61, 0, 0.36);
      border: 1.20554px solid #694EAB;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 25.8389px;
      line-height: 31px;
      text-align: center;
      color: #FFFFFF;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .sb-home-btn:hover,
    .sb-home-btn:focus-visible {
      background: rgba(0, 80, 0, 0.5);
      box-shadow: 0 0 18px 4px rgba(105, 78, 171, 0.5);
      outline: none;
    }

    /* ── Mystical flicker overlay ── */
    @keyframes sb-flicker {
      0%   { opacity: 0; }
      4%   { opacity: 0.07; }
      8%   { opacity: 0; }
      18%  { opacity: 0.11; }
      22%  { opacity: 0; }
      37%  { opacity: 0.05; }
      39%  { opacity: 0; }
      55%  { opacity: 0.09; }
      60%  { opacity: 0.03; }
      65%  { opacity: 0; }
      80%  { opacity: 0.08; }
      85%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes sb-dim-pulse {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.28; }
    }
    .sb-mist {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80, 40, 160, 0.18) 0%, rgba(10, 5, 30, 0.38) 70%, rgba(0,0,0,0.48) 100%);
      animation: sb-dim-pulse 6s ease-in-out infinite, sb-flicker 9s step-end infinite;
    }

    /* ── Entrance animations ── */
    @keyframes sb-enter {
      0%   { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .sb-canvas .sb-heading,
    .sb-canvas .sb-sub,
    .sb-canvas .sb-confirm,
    .sb-canvas .sb-home-btn { animation: sb-enter 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="canvas sb-canvas" id="canvas">

      <!-- Background: BGNEW.png -->
      <div class="sb-bg" aria-hidden="true"></div>
      <!-- Rectangle 12: hidden -->
      <div class="sb-overlay" aria-hidden="true"></div>

      <!-- Mystical mist overlay -->
      <div class="sb-mist" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>

      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- CLAIM RECEIVED — centered, top 241 -->
      <h1 class="sb-heading">CLAIM RECEIVED</h1>

      <!-- YOUR REWARD IS ON IT'S WAY — centered, top 327.5 -->
      <p class="sb-sub">YOUR REWARD IS ON IT'S WAY</p>

      <!-- Icon — img tag, centered, top 393 -->
      <img class="sb-icon" src="LCLAIM.png" alt="" aria-hidden="true" />

      <!-- Confirmation text — centered, top 743 -->
      <p class="sb-confirm">A CONFIRMATION HAS BEEN SENT TO YOUR EMAIL AND WHATSAPP.<br>KEEP THE TRUTH. WEAR THE MEMORY.</p>

      <!-- BACK TO HOME button — centered, top 853 -->
      <a class="sb-home-btn" href="index.html" data-transition>BACK TO HOME</a>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Start spin + glow after entrance completes
    var sbIcon = document.querySelector('.sb-icon');
    if (sbIcon) {
      setTimeout(function () {
        sbIcon.classList.add('sb-live');
      }, 900);
    }
  </script>
</body>
</html>
