<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Access Granted." />
  <title>Fukaimori · Access Granted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── GRANTED page — Frame 235 exact Figma spec ── */

    .gr-canvas { background: transparent; }

    /* Background: BGNEW.png, no overlay */
    .gr-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background-image: url("BGNEW.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    /* Rectangle 12: visibility hidden — no overlay */
    .gr-overlay { display: none; }

    /* ACCESS GRANTED — left calc(50%−592/2−0.21px), top 241, 592×80 */
    .gr-heading {
      position: absolute;
      left: calc(50% - 592px / 2 - 0.21px);
      top: 241px;
      width: 592px;
      height: 80px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 66.7996px;
      line-height: 80px;
      text-align: center;
      color: #A99AFF;
      margin: 0;
      white-space: nowrap;
    }

    /* THE TRUTH ACKNOWLEDGES YOU — centered, top 327.5, 446×32 */
    .gr-sub {
      position: absolute;
      left: calc(50% - 446px / 2 - 0.15px);
      top: 327.5px;
      width: 446px;
      height: 32px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 26.3919px;
      line-height: 32px;
      text-align: center;
      color: #CFB7FF;
      margin: 0;
      white-space: nowrap;
    }

    /* Logo image — centered, top 394, 318×319 */
    @keyframes gr-spin-glow {
      0%   {
        transform: rotate(0deg);
        filter: drop-shadow(0 0  4px rgba(155, 80, 255, 0.4))
                drop-shadow(0 0  9px rgba(155, 80, 255, 0.15));
      }
      40%  {
        transform: rotate(144deg);
        filter: drop-shadow(0 0 12px rgba(175, 60, 255, 0.7))
                drop-shadow(0 0 24px rgba(175, 60, 255, 0.3))
                drop-shadow(0 0 40px rgba(120, 30, 255, 0.15));
      }
      50%  {
        transform: rotate(180deg);
        filter: drop-shadow(0 0  5px rgba(155, 80, 255, 0.35))
                drop-shadow(0 0 12px rgba(155, 80, 255, 0.12));
      }
      85%  {
        transform: rotate(306deg);
        filter: drop-shadow(0 0 14px rgba(185, 55, 255, 0.75))
                drop-shadow(0 0 28px rgba(185, 55, 255, 0.35))
                drop-shadow(0 0 45px rgba(120, 30, 255, 0.18));
      }
      100% {
        transform: rotate(360deg);
        filter: drop-shadow(0 0  4px rgba(155, 80, 255, 0.4))
                drop-shadow(0 0  9px rgba(155, 80, 255, 0.15));
      }
    }
    .gr-logosuc {
      position: absolute;
      left: calc(50% - 318px / 2);
      top: 394px;
      width: 318px;
      height: 319px;
      z-index: 6;
      display: block;
      object-fit: contain;
      pointer-events: none;
      transform-origin: center center;
    }
    .gr-logosuc.gr-live {
      animation: gr-spin-glow 10s linear infinite;
    }

    /* YOU MAY CLAIM WHAT IS YOURS. — centered, top 749, 313×23 */
    .gr-reward-q {
      position: absolute;
      left: calc(50% - 313px / 2 + 0.81px);
      top: 749px;
      width: 313px;
      height: 23px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 19.2792px;
      line-height: 23px;
      text-align: center;
      color: #A99AFF;
      margin: 0;
      white-space: nowrap;
    }

    /* CLAIM REWARD button — left calc(50%−307/2−0.5px), top 789, 307×50 */
    .gr-claim-btn {
      position: absolute;
      left: calc(50% - 307px / 2 - 0.5px);
      top: 789px;
      width: 307px;
      height: 50px;
      z-index: 7;
      box-sizing: border-box;
      background: rgba(0, 61, 0, 0.36);
      border: 1.20554px solid #694EAB;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 25.8389px;
      line-height: 31px;
      text-align: center;
      color: #FFFFFF;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .gr-claim-btn:hover,
    .gr-claim-btn:focus-visible {
      background: rgba(0, 80, 0, 0.5);
      box-shadow: 0 0 18px 4px rgba(105, 78, 171, 0.5);
      outline: none;
    }

    /* Close × — left 1488, top 215, 28×28, #C1AAFA */
    .gr-close {
      position: absolute;
      left: 1488px;
      top: 215px;
      width: 28px;
      height: 28px;
      z-index: 9;
      display: block;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.3s ease;
    }
    .gr-close:hover,
    .gr-close:focus-visible {
      transform: scale(1.15);
      outline: none;
    }
    .gr-close-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: calc(28px * 0.658);
      background: #C1AAFA;
      border-radius: 1px;
      display: block;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .gr-close-line-1 { transform: translate(-50%, -50%) rotate(45deg); }
    .gr-close-line-2 { transform: translate(-50%, -50%) rotate(-45deg); }
    .gr-close:hover .gr-close-line,
    .gr-close:focus-visible .gr-close-line {
      background: #e8deff;
      box-shadow: 0 0 8px rgba(193, 170, 250, 0.9);
    }

    /* ── Mystical flicker overlay (same as droppoint) ── */
    @keyframes gr-flicker {
      0%   { opacity: 0; }
      4%   { opacity: 0.07; }
      8%   { opacity: 0; }
      18%  { opacity: 0.11; }
      22%  { opacity: 0; }
      37%  { opacity: 0.05; }
      39%  { opacity: 0; }
      55%  { opacity: 0.09; }
      60%  { opacity: 0.03; }
      65%  { opacity: 0; }
      80%  { opacity: 0.08; }
      85%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes gr-dim-pulse {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.28; }
    }
    .gr-mist {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80, 40, 160, 0.18) 0%, rgba(10, 5, 30, 0.38) 70%, rgba(0,0,0,0.48) 100%);
      animation: gr-dim-pulse 6s ease-in-out infinite, gr-flicker 9s step-end infinite;
    }

    /* ── Entrance animations ── */
    @keyframes gr-enter {
      0%   { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    @keyframes gr-enter-logo {
      0%   { opacity: 0; filter: blur(6px); }
      100% { opacity: 1; filter: blur(0); }
    }
    .gr-canvas .gr-heading,
    .gr-canvas .gr-sub,
    .gr-canvas .gr-reward-q,
    .gr-canvas .gr-claim-btn,
    .gr-canvas .gr-close { animation: gr-enter 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }
    /* Logo entrance — no translateY so spin transform isn't clobbered */
    .gr-canvas .gr-logosuc:not(.gr-live) { animation: gr-enter-logo 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }
    /* Once gr-live is added, spin-glow takes full control */
    .gr-canvas .gr-logosuc.gr-live { animation: gr-spin-glow 10s linear infinite !important; }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="canvas gr-canvas" id="canvas">

      <!-- Background: BGNEW.png -->
      <div class="gr-bg" aria-hidden="true"></div>
      <!-- Rectangle 12: hidden -->
      <div class="gr-overlay" aria-hidden="true"></div>

      <!-- Mystical mist overlay -->
      <div class="gr-mist" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>

      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- ACCESS GRANTED -->
      <h1 class="gr-heading">ACCESS GRANTED</h1>

      <!-- THE TRUTH ACKNOWLEDGES YOU -->
      <p class="gr-sub">THE TRUTH ACKNOWLEDGES YOU</p>

      <!-- Logo image — centered, top 394 -->
      <img class="gr-logosuc" src="logosuc.png" alt="" aria-hidden="true" />

      <!-- YOU MAY CLAIM WHAT IS YOURS. — top 749 -->
      <p class="gr-reward-q">YOU MAY CLAIM WHAT IS YOURS.</p>

      <!-- CLAIM REWARD button — top 789 -->
      <button class="gr-claim-btn" type="button" onclick="window.location.href='claim.html'">CLAIM REWARD</button>

      <!-- Close × -->
      <a class="gr-close" href="index.html" data-transition aria-label="Close — return to entrance">
        <span class="gr-close-line gr-close-line-1" aria-hidden="true"></span>
        <span class="gr-close-line gr-close-line-2" aria-hidden="true"></span>
      </a>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Start spin + glow after entrance completes (0.1s delay + 0.75s duration)
    var logosuc = document.querySelector('.gr-logosuc');
    if (logosuc) {
      setTimeout(function () {
        logosuc.classList.add('gr-live');
      }, 900);
    }
  </script>
</body>
</html>
