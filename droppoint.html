<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — Drop Point. Submit your recovered sequence." />
  <title>Fukaimori · Drop Point</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Maven+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── DROP POINT page — Frame 233 exact Figma spec ── */

    .dp-canvas { background: transparent; }

    /* Background: BGNEW.png */
    .dp-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background-image: url("BGNEW.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    /* Rectangle 12: visibility hidden — no overlay */
    .dp-overlay { display: none; }

    /* DROP POINT heading — left calc(50%−416/2−0.06px), top 319, 416×80 */
    .dp-heading {
      position: absolute;
      left: calc(50% - 416px / 2 - 0.06px);
      top: 319px;
      width: 416px;
      height: 80px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 66.7996px;
      line-height: 80px;
      text-align: center;
      color: #A99AFF;
      margin: 0;
      white-space: nowrap;
    }

    /* SUBMIT YOUR RECOVERED SEQUENCE — left calc(50%−594/2), top 405.5, 594×39 */
    .dp-sub {
      position: absolute;
      left: calc(50% - 594px / 2);
      top: 405.5px;
      width: 594px;
      height: 39px;
      z-index: 6;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 32.1534px;
      line-height: 39px;
      text-align: center;
      color: #CFB7FF;
      margin: 0;
      white-space: nowrap;
    }

    /* RECOVERED SEQUENCE label — left 637.15, top 475.13, 208×23 */
    .dp-label {
      position: absolute;
      left: 637.15px;
      top: 475.13px;
      width: 208px;
      height: 23px;
      z-index: 6;
      font-family: "Maven Pro", sans-serif;
      font-weight: 500;
      font-size: 19.6671px;
      line-height: 23px;
      text-align: center;
      color: #A99AFF;
      margin: 0;
    }

    /* 9 input boxes — individually positioned, all top 515.33, 85.88×85.88 */
    .dp-seq-box {
      position: absolute;
      top: 515.33px;
      box-sizing: border-box;
      width: 85.88px;
      height: 85.88px;
      background: transparent;
      border: 1.43774px solid #786BC7;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 36px;
      text-align: center;
      color: #C1AAFA;
      outline: none;
      caret-color: #A99AFF;
      z-index: 6;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      text-transform: uppercase;
    }
    .dp-seq-box:focus {
      border-color: #A99AFF;
      box-shadow: 0 0 10px rgba(155, 100, 255, 0.4);
    }
    .dp-seq-box.wrong {
      border-color: #FF2D2D;
      color: #FF2D2D;
    }
    /* Individual left positions from Figma */
    .dp-seq-box:nth-child(1) { left: 637px; }
    .dp-seq-box:nth-child(2) { left: 738.12px; }
    .dp-seq-box:nth-child(3) { left: 839.24px; }
    .dp-seq-box:nth-child(4) { left: 940.36px; }
    .dp-seq-box:nth-child(5) { left: 1041.48px; }
    .dp-seq-box:nth-child(6) { left: 1142.6px; }
    .dp-seq-box:nth-child(7) { left: 1243.71px; }
    .dp-seq-box:nth-child(8) { left: 1344.83px; }
    .dp-seq-box:nth-child(9) { left: 1445.95px; }

    /* Shake wrapper for wrong answer */
    @keyframes dp-shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }
    /* Wrapper covers canvas for shake animation but must not block input clicks */
    .dp-seq { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
    .dp-seq-box { pointer-events: auto; }
    .dp-seq.shake .dp-seq-box { animation: dp-shake 0.4s ease; }

    /* VERIFY button — left 998, top 632, 174×52 */
    .dp-verify {
      position: absolute;
      left: 998px;
      top: 632px;
      width: 174px;
      height: 52px;
      z-index: 7;
      box-sizing: border-box;
      background: rgba(55, 22, 255, 0.19);
      border: 0.981592px solid #786BC7;
      font-family: "Bona Nova", Georgia, serif;
      font-weight: 400;
      font-size: 19.7005px;
      line-height: 24px;
      text-align: center;
      color: #786BC7;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .dp-verify:hover,
    .dp-verify:focus-visible {
      background: rgba(55, 22, 255, 0.32);
      box-shadow: 0 0 16px rgba(105, 78, 171, 0.5);
      outline: none;
    }

    /* NEED ASSISTANCE? — left calc(50%−171/2−0.73px), top 712 */
    .dp-assist-q {
      position: absolute;
      left: calc(50% - 171px / 2 - 0.73px);
      top: 712px;
      width: 171px;
      height: 22px;
      z-index: 6;
      font-family: "Maven Pro", sans-serif;
      font-weight: 500;
      font-size: 18.7517px;
      line-height: 22px;
      color: rgba(226, 214, 255, 0.59);
      margin: 0;
      white-space: nowrap;
    }

    /* ACCESS ARCHIVE NOTES — left calc(50%−202/2−9.6px), top 740.02 */
    .dp-assist-link {
      position: absolute;
      left: calc(50% - 202px / 2 - 9.6px);
      top: 740.02px;
      width: 202px;
      height: 21px;
      z-index: 6;
      font-family: "Maven Pro", sans-serif;
      font-weight: 500;
      font-size: 17.5134px;
      line-height: 21px;
      text-align: center;
      color: rgba(226, 214, 255, 0.59);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s ease;
    }
    .dp-assist-link:hover,
    .dp-assist-link:focus-visible {
      color: rgba(226, 214, 255, 0.9);
      outline: none;
    }
    /* Ellipse 14 — red dot: left 1181.73, top 744.89, 12.18×12.18 */
    .dp-assist-dot {
      position: absolute;
      left: 1181.73px;
      top: 744.89px;
      width: 12.18px;
      height: 12.18px;
      z-index: 6;
      background: #FF2D2D;
      border-radius: 50%;
      pointer-events: none;
      transition: background 0.3s ease;
    }
    /* Dot states via JS-toggled classes */
    .dp-assist-dot.dp-dot-entered {
      animation: dp-dot-pulse 2.2s ease-in-out infinite;
    }
    .dp-assist-dot.dp-dot-purple {
      background: #9B6FFF;
      animation: dp-dot-purple 1.4s ease-in-out infinite;
    }

    /* Close × — left 1488, top 205, 28×28, #C1AAFA */
    .dp-close {
      position: absolute;
      left: 1488px;
      top: 205px;
      width: 28px;
      height: 28px;
      z-index: 9;
      display: block;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.3s ease;
    }
    .dp-close:hover,
    .dp-close:focus-visible { transform: scale(1.15); outline: none; }
    .dp-close-line {
      position: absolute;
      left: 50%; top: 50%;
      width: 2px;
      height: calc(28px * 0.658);
      background: #C1AAFA;
      border-radius: 1px;
      display: block;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .dp-close-line-1 { transform: translate(-50%, -50%) rotate(45deg); }
    .dp-close-line-2 { transform: translate(-50%, -50%) rotate(-45deg); }
    .dp-close:hover .dp-close-line,
    .dp-close:focus-visible .dp-close-line {
      background: #e8deff;
      box-shadow: 0 0 8px rgba(193, 170, 250, 0.9);
    }

    /* ── Mystical flicker overlay ── */
    @keyframes dp-flicker {
      0%   { opacity: 0; }
      4%   { opacity: 0.07; }
      8%   { opacity: 0; }
      15%  { opacity: 0; }
      18%  { opacity: 0.11; }
      22%  { opacity: 0; }
      35%  { opacity: 0; }
      37%  { opacity: 0.05; }
      39%  { opacity: 0; }
      50%  { opacity: 0; }
      55%  { opacity: 0.09; }
      60%  { opacity: 0.03; }
      65%  { opacity: 0; }
      75%  { opacity: 0; }
      80%  { opacity: 0.08; }
      85%  { opacity: 0; }
      90%  { opacity: 0.04; }
      95%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes dp-flash {
      0%   { opacity: 0; }
      1%   { opacity: 0.18; }
      2%   { opacity: 0; }
      3%   { opacity: 0.08; }
      4%   { opacity: 0; }
      100% { opacity: 0; }
    }
    /* Base dim pulse — slow breath */
    @keyframes dp-dim-pulse {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.32; }
    }
    .dp-mist {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(80, 40, 160, 0.22) 0%, rgba(10, 5, 30, 0.45) 70%, rgba(0,0,0,0.55) 100%);
      animation: dp-dim-pulse 6s ease-in-out infinite, dp-flicker 9s step-end infinite;
    }
    .dp-mist::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(200, 160, 255, 0.06);
      animation: dp-flash 14s step-end infinite 3s;
    }

    /* ── Red dot subtle pulse glow ── */
    @keyframes dp-dot-pulse {
      0%, 100% {
        box-shadow: 0 0 3px 1px rgba(255, 45, 45, 0.55),
                    0 0 6px 2px rgba(255, 45, 45, 0.2);
      }
      50% {
        box-shadow: 0 0 5px 2px rgba(255, 45, 45, 0.75),
                    0 0 10px 4px rgba(255, 45, 45, 0.3);
      }
    }
    @keyframes dp-dot-purple {
      0%, 100% {
        box-shadow: 0 0 4px 1px rgba(155, 111, 255, 0.6),
                    0 0 8px 3px rgba(155, 111, 255, 0.25);
      }
      50% {
        box-shadow: 0 0 7px 3px rgba(155, 111, 255, 0.85),
                    0 0 14px 5px rgba(155, 111, 255, 0.4);
      }
    }

    /* ── Entrance animations ── */
    @keyframes dp-enter {
      0%   { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .dp-canvas .dp-heading,
    .dp-canvas .dp-sub,
    .dp-canvas .dp-label,
    .dp-canvas .dp-seq-box,
    .dp-canvas .dp-verify,
    .dp-canvas .dp-assist-q,
    .dp-canvas .dp-assist-link,
    .dp-canvas .dp-close { animation: dp-enter 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }

    /* Dot: starts hidden, becomes visible + pulsing after entrance */
    .dp-assist-dot { opacity: 0; transition: opacity 0.4s ease; }
    .dp-assist-dot.dp-dot-entered {
      opacity: 1;
      animation: dp-dot-pulse 2.2s ease-in-out infinite;
    }
    .dp-assist-dot.dp-dot-purple {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="canvas dp-canvas" id="canvas">

      <!-- Background: BGNEW.png -->
      <div class="dp-bg" aria-hidden="true"></div>
      <!-- Rectangle 12: hidden -->
      <div class="dp-overlay" aria-hidden="true"></div>

      <!-- Mystical mist/flicker overlay -->
      <div class="dp-mist" aria-hidden="true"></div>

      <!-- Feather particles -->
      <canvas class="starfield" aria-hidden="true"></canvas>
      <!-- Page transition -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- DROP POINT heading -->
      <h1 class="dp-heading">DROP POINT</h1>

      <!-- SUBMIT YOUR RECOVERED SEQUENCE -->
      <p class="dp-sub">SUBMIT YOUR RECOVERED SEQUENCE</p>

      <!-- RECOVERED SEQUENCE label -->
      <p class="dp-label">RECOVERED SEQUENCE</p>

      <!-- Shake wrapper (invisible, for animation grouping) -->
      <div class="dp-seq" id="dp-seq" role="group" aria-label="Enter recovered sequence">
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 1" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 2" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 3" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 4" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 5" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 6" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 7" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 8" autocomplete="off" />
        <input class="dp-seq-box" type="text" maxlength="1" inputmode="text" aria-label="Character 9" autocomplete="off" />
      </div>

      <!-- VERIFY button -->
      <button class="dp-verify" type="button">VERIFY</button>

      <!-- NEED ASSISTANCE? -->
      <p class="dp-assist-q">NEED ASSISTANCE?</p>

      <!-- ACCESS ARCHIVE NOTES -->
      <a class="dp-assist-link" href="keynote.html" data-transition aria-label="Access archive notes">ACCESS ARCHIVE NOTES</a>

      <!-- Red dot (Ellipse 14) -->
      <span class="dp-assist-dot" aria-hidden="true"></span>

      <!-- Close × -->
      <a class="dp-close" href="index.html" data-transition aria-label="Close Drop Point">
        <span class="dp-close-line dp-close-line-1" aria-hidden="true"></span>
        <span class="dp-close-line dp-close-line-2" aria-hidden="true"></span>
      </a>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    (function () {
      var SECRET    = 'CR7ISGOAT';
      var seqGroup  = document.getElementById('dp-seq');
      var verifyBtn = document.querySelector('.dp-verify');
      var boxes     = document.querySelectorAll('.dp-seq-box');

      if (!verifyBtn || !seqGroup || !boxes.length) return;

      verifyBtn.addEventListener('click', function () {
        var entered = Array.from(boxes).map(function (b) { return b.value; }).join('').toUpperCase();
        if (entered === SECRET) {
          window.location.href = 'granted.html';
        } else {
          boxes.forEach(function (b) { b.classList.add('wrong'); });
          seqGroup.classList.remove('shake');
          void seqGroup.offsetWidth;
          seqGroup.classList.add('shake');
          seqGroup.addEventListener('animationend', function handler() {
            seqGroup.removeEventListener('animationend', handler);
            seqGroup.classList.remove('shake');
            boxes.forEach(function (b) { b.classList.remove('wrong'); });
          });
        }
      });

      boxes.forEach(function (box, i) {
        box.addEventListener('input', function () {
          box.value = box.value.slice(-1).toUpperCase();
          if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
        });
        box.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
          if (e.key === 'Enter') verifyBtn.click();
        });
      });
    })();

    // Red dot: fade in after entrance, then pulse; hover link → purple glow
    (function () {
      var dot  = document.querySelector('.dp-assist-dot');
      var link = document.querySelector('.dp-assist-link');
      if (!dot) return;

      setTimeout(function () {
        dot.classList.add('dp-dot-entered');
      }, 950);

      if (link) {
        link.addEventListener('mouseenter', function () {
          dot.classList.remove('dp-dot-entered');
          dot.classList.add('dp-dot-purple');
        });
        link.addEventListener('mouseleave', function () {
          dot.classList.remove('dp-dot-purple');
          dot.classList.add('dp-dot-entered');
        });
        link.addEventListener('focus', function () {
          dot.classList.remove('dp-dot-entered');
          dot.classList.add('dp-dot-purple');
        });
        link.addEventListener('blur', function () {
          dot.classList.remove('dp-dot-purple');
          dot.classList.add('dp-dot-entered');
        });
      }
    })();
  </script>
</body>
</html>
