<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05020a" />
  <meta name="description" content="Fukaimori — An Archive. Exploring the depths of humanity." />
  <title>Fukaimori · An Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700&family=Cantarell:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="viewport">
    <!-- Fixed 1512 x 982 design canvas, scaled to fit the screen -->
    <div class="canvas landing-canvas" id="canvas">

      <!-- Fallback cosmic scene (shown if the background image is missing) -->
      <div class="scene" aria-hidden="true">
        <div class="stars"></div>
        <div class="sigil">
          <svg class="ring ring-outer" viewBox="0 0 400 400" role="presentation">
            <circle cx="200" cy="200" r="196" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
            <circle cx="200" cy="200" r="176" fill="none" stroke="url(#g)" stroke-width="0.6" stroke-dasharray="2 6" opacity="0.6"/>
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#C5BCFF"/>
                <stop offset="1" stop-color="#694EAB"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="ring ring-inner" viewBox="0 0 400 400" role="presentation">
            <circle cx="200" cy="200" r="150" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.7"/>
            <g stroke="url(#g)" stroke-width="1" fill="none" opacity="0.85">
              <polygon points="200,60 214,186 340,200 214,214 200,340 186,214 60,200 186,186"/>
            </g>
          </svg>
          <div class="moon"><div class="moon-body"></div></div>
        </div>
      </div>

      <!-- Real design background image -->
      <div class="photo" aria-hidden="true"></div>


      <!-- Drifting clouds / mist overlay -->
      <div class="clouds" aria-hidden="true">
        <span class="cloud cloud-1"></span>
        <span class="cloud cloud-2"></span>
        <span class="cloud cloud-3"></span>
      </div>

      <!-- Landing-page fog (rolling mist) -->
      <div class="fog" aria-hidden="true">
        <span class="fog-layer fog-a"></span>
        <span class="fog-layer fog-b"></span>
        <span class="fog-layer fog-c"></span>
      </div>

      <!-- Animated star field canvas -->
      <canvas class="starfield" aria-hidden="true"></canvas>

      <!-- BGLP 2 moon overlay (background layer) -->
      <div class="moon-photo" aria-hidden="true"></div>

      <!-- BGLPS portal hitbox — click to enter archive, denyut ungu -->
      <a class="moon-link" href="archive.html" aria-label="Enter the archive" data-transition></a>

      <!-- Page transition overlay -->
      <div class="page-transition" aria-hidden="true"></div>

      <!-- Brand (top-left) -->

      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">FUKAIMORI</span>
      </div>

      <!-- Drop point (top-right) -->
      <div class="drop-point">
        <span class="drop-text">DROP POINT</span>
        <span class="drop-dot" aria-hidden="true"></span>
      </div>

      <!-- Title block (bottom-center) -->
      <h1 class="title">AN ARCHIVE</h1>
      <p class="subtitle">EXPLORING THE DEPTHS OF HUMANITY</p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
